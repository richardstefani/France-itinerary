<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>France July 2026 - Itinerary</title>
<style>
:root {
  --ink: #1c1c2e;
  --ink-soft: #4a4a68;
  --ink-muted: #8b8aa1;
  --paper: #f8f7f2;
  --paper-warm: #efede4;
  --card: #ffffff;
  --accent: #c8782a;
  --accent-soft: #f4e8d8;
  --accent-dark: #9f5d20;
  --blue: #2a5f8a;
  --green: #3a7d5a;
  --border: #e4e0d8;
  --shadow: 0 2px 14px rgba(28,28,46,0.08);
  --shadow-md: 0 8px 30px rgba(28,28,46,0.13);
  --radius: 14px;
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.6;
}
#app { min-height: 100vh; display: flex; flex-direction: column; }
.itin-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: linear-gradient(180deg, #1c1c2e 0%, #25253a 100%);
  color: var(--paper);
  padding: max(24px, env(safe-area-inset-top)) 18px 0;
  box-shadow: 0 8px 28px rgba(28,28,46,0.18);
}
.header-inner { max-width: 1060px; margin: 0 auto; }
.itin-eyebrow {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--accent);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.itin-eyebrow::before { content: ""; width: 24px; height: 1px; background: var(--accent); opacity: 0.55; }
.title-row { display: flex; align-items: flex-end; gap: 16px; justify-content: space-between; margin-top: 8px; }
.itin-title {
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(28px, 5vw, 50px);
  font-weight: 400;
  line-height: 1.08;
  margin: 0;
}
.itin-dates { color: rgba(248,247,242,0.58); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; margin: 8px 0 18px; }
.toolbar { display: flex; gap: 8px; flex-shrink: 0; padding-bottom: 18px; }
.tool-btn {
  width: 38px;
  height: 38px;
  border: 1px solid rgba(248,247,242,0.18);
  color: var(--paper);
  background: rgba(255,255,255,0.06);
  border-radius: 999px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.tool-btn:hover { background: rgba(255,255,255,0.12); }
.day-controls {
  display: grid;
  grid-template-columns: 38px minmax(0, 1fr) 38px;
  gap: 8px;
  align-items: center;
  padding-bottom: 12px;
}
.nav-btn, .day-jump {
  height: 38px;
  border: 1px solid rgba(248,247,242,0.18);
  color: var(--paper);
  background: rgba(255,255,255,0.06);
  border-radius: 999px;
}
.nav-btn {
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.nav-btn:disabled {
  opacity: 0.28;
  cursor: default;
}
.day-jump {
  min-width: 0;
  padding: 0 36px 0 14px;
  font-size: 13px;
  color: var(--paper);
  appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, var(--paper) 50%),
    linear-gradient(135deg, var(--paper) 50%, transparent 50%);
  background-position:
    calc(100% - 18px) 16px,
    calc(100% - 12px) 16px;
  background-size: 6px 6px, 6px 6px;
  background-repeat: no-repeat;
}
.day-jump option { color: var(--ink); background: var(--paper); }
.day-tabs {
  display: flex;
  gap: 1px;
  overflow-x: auto;
  scrollbar-width: none;
  margin: 0 -18px;
  padding: 0 18px;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  border: 0;
  background: transparent;
  color: rgba(248,247,242,0.42);
  padding: 11px 15px 13px;
  cursor: pointer;
  white-space: nowrap;
  position: relative;
  min-width: 84px;
  text-align: center;
}
.day-tab::after {
  content: "";
  position: absolute;
  left: 10px;
  right: 10px;
  bottom: 0;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transition: transform 0.2s ease;
}
.day-tab.active::after { transform: scaleX(1); }
.day-tab.active { color: var(--paper); }
.day-tab-label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; color: var(--accent); }
.day-tab-name { display: block; max-width: 150px; overflow: hidden; text-overflow: ellipsis; font-family: Georgia, "Times New Roman", serif; font-size: 14px; margin-top: 2px; }
.itin-body { width: 100%; max-width: 1060px; margin: 0 auto; padding: 24px 16px 56px; }
.panel { display: none; animation: fadeUp 0.24s ease; }
.panel.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.panel-shell {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.panel-heading {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #ffffff 0%, #fbfaf6 100%);
}
.panel-kicker { color: var(--accent); font-size: 11px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; }
.panel-title { margin: 3px 0 0; font-family: Georgia, "Times New Roman", serif; font-size: clamp(22px, 4vw, 34px); line-height: 1.15; font-weight: 400; }
.editable-content {
  padding: 18px 20px 24px;
  outline: none;
}
.editable-content:focus { box-shadow: inset 0 0 0 2px var(--accent-soft); }
.editable-content h1, .editable-content h2, .editable-content h3 {
  font-family: Georgia, "Times New Roman", serif;
  font-weight: 400;
  line-height: 1.2;
  margin: 24px 0 10px;
}
.editable-content h1 { font-size: 30px; }
.editable-content h2 { font-size: 24px; padding-top: 8px; border-top: 1px solid var(--border); }
.editable-content h3 { font-size: 21px; color: var(--accent-dark); }
.editable-content h1:first-child, .editable-content h2:first-child, .editable-content h3:first-child { margin-top: 0; }
.editable-content p { margin: 10px 0; }
.editable-content ul, .editable-content ol { margin: 8px 0 14px 1.35rem; padding: 0; }
.editable-content li { margin: 4px 0; padding-left: 2px; }
.editable-content li::marker { color: var(--accent); }
.editable-content strong { color: var(--ink); font-weight: 750; }
.editable-content em { color: var(--ink-soft); }
.editable-content hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
.editable-content table { width: 100%; border-collapse: collapse; margin: 14px 0 20px; font-size: 14px; display: block; overflow-x: auto; }
.editable-content th, .editable-content td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; vertical-align: top; }
.editable-content th { background: var(--paper-warm); color: var(--ink); }
.saved-note { position: fixed; right: 16px; bottom: 16px; background: var(--ink); color: var(--paper); border-radius: 999px; padding: 9px 13px; font-size: 12px; opacity: 0; transform: translateY(8px); transition: all 0.2s ease; pointer-events: none; }
.saved-note.show { opacity: 1; transform: translateY(0); }
@media (min-width: 760px) {
  .itin-header { padding-left: 28px; padding-right: 28px; }
  .itin-body { padding: 30px 28px 70px; }
  .editable-content { padding: 24px 30px 32px; }
  .panel-heading { padding: 22px 30px; }
}
@media (max-width: 640px) {
  body { font-size: 15px; }
  .title-row { align-items: flex-start; }
  .toolbar { padding-top: 3px; }
  .tool-btn { width: 34px; height: 34px; }
  .day-tab { min-width: 76px; padding-left: 12px; padding-right: 12px; }
  .day-tab-name { max-width: 112px; font-size: 13px; }
  .itin-body { padding: 16px 10px 44px; }
  .panel-shell { border-radius: 10px; }
  .editable-content { padding: 15px 14px 20px; }
  .panel-heading { padding: 15px 14px; }
}
@media print {
  .itin-header { position: static; }
  .toolbar, .day-tabs { display: none; }
  .panel { display: block; page-break-after: always; }
  .itin-body { max-width: none; padding: 0; }
  .panel-shell { box-shadow: none; border: 0; }
}
</style>
</head>

<script>
const TRIP = {"title": "France July 2026 - Itinerary", "dates": "2 July - 28 July 2026", "intro_html": "<p><strong>Trip Overview:</strong></p>\n<ul>\n<li><strong>Travelers:</strong> Family of 4 (2 adults, 2 sons aged 19 & 17)</li>\n<li><strong>Duration:</strong> 2 July – 28 July 2026 (27 nights total)</li>\n<li><strong>Inbound Flight:</strong> Nice Airport, Thursday 2 July @ 10:00 AM</li>\n<li><strong>Family Split:</strong> Sons depart Nice on Thursday 9 July @ 10:45 AM (Week 1 only)</li>\n<li><strong>Outbound Flight:</strong> Marseille, Tuesday 28 July @ 10:55 AM (2 adults)</li>\n</ul>\n<hr>\n<h2>PART 1: ANTIBES (2–9 JULY) – FAMILY RIVIERA WEEK</h2>\n<p><strong>Theme:</strong> Beach time, harbour charm, day trips, family bonding <strong>Accommodation:</strong> Antibes (central location for Riviera access) <strong>Transport Strategy:</strong> SNCF rail for day trips to Nice/Cannes/Monaco; walking/local bus in Antibes</p>\n<p><strong>Activity overview for the week:</strong></p>\n<table>\n<thead><tr><th>Day</th><th>Theme</th><th>Headline activity</th></tr></thead>\n<tbody>\n<tr><td>Thu 2 July</td><td>Arrival</td><td>Settle in, Old Town explore, first swim</td></tr>\n<tr><td>Fri 3 July</td><td>Active</td><td>Cap d'Antibes coastal walk + watersports afternoon</td></tr>\n<tr><td>Sat 4 July</td><td>Day trip</td><td>Nice — Vieux Nice, Promenade, beach</td></tr>\n<tr><td>Sun 5 July</td><td>Day trip</td><td>Cannes + Îles de Lérins boat trip</td></tr>\n<tr><td>Mon 6 July</td><td>Adrenaline</td><td>Jet skis, wakeboarding & watersports at Juan-les-Pins</td></tr>\n<tr><td>Tue 7 July</td><td>Relaxed</td><td>Marché Provençal, Musée Picasso, beach day</td></tr>\n<tr><td>Wed 8 July</td><td>Relaxed</td><td>Final beach, Port Vauban wander, farewell dinner</td></tr>\n<tr><td>Thu 9 July</td><td>Departure</td><td>Boys fly home; Richard & partner drive to Aix</td></tr>\n</tbody></table>\n<hr>", "days": [{"label": "Day 1", "name": "ARRIVAL & SETTLING IN", "heading": "DAY 1 – THURSDAY, 2 JULY: ARRIVAL & SETTLING IN", "html": "<p><strong>Theme:</strong> Arrive, decompress, first taste of Antibes</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>10:00 AM</strong> – Arrive Nice Côte d'Azur Airport</li>\n<li><strong>10:30–11:15 AM</strong> – Travel to Antibes\n<ul>\n<li><em>Recommended:</em> Train from Nice to Antibes (~30 min direct, €12–15 per person) — quickest option, no parking hassle</li>\n<li><em>Alternative:</em> Rental car (~45 min via A8 motorway) — useful if you plan to keep a car for the week</li>\n</ul></li>\n<li><strong>12:00 PM</strong> – Check in to accommodation (aim for Old Town or harbour-adjacent location)</li>\n<li><strong>12:30–1:30 PM</strong> – Lunch near harbour — first meal, keep it casual\n<ul>\n<li><em>Suggested:</em> <strong>La Boîte à Matelots</strong> (relaxed, family-friendly, right on the port) or <strong>Le Vauban</strong> (waterfront terrace)</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>2:00–5:00 PM</strong> – Explore Antibes Old Town at leisure\n<ul>\n<li>Wander the narrow Provençal streets; spot Château Grimaldi (houses the Picasso Museum)</li>\n<li>Walk the ramparts for views over the Med and the Baie des Anges</li>\n<li>Browse the covered Marché Provençal on Cours Masséna (open daily in summer)</li>\n</ul></li>\n<li><strong>5:30 PM</strong> – First swim at <strong>Plage de la Gravette</strong> (sheltered cove below the ramparts, calm water, ideal for first-day dip) or <strong>Plage de Ponteil</strong></li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Aperitif then dinner — easy, celebratory first night\n<ul>\n<li><em>Suggested:</em> <strong>Gaston & Gastronome</strong> (relaxed bistro, good for families) or <strong>Le Comptoir</strong> (buzzy, central)</li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Antibes</p>\n<hr>"}, {"label": "Day 2", "name": "CAP D'ANTIBES WALK + WATERSPORTS", "heading": "DAY 2 – FRIDAY, 3 JULY: CAP D'ANTIBES WALK + WATERSPORTS", "html": "<p><strong>Theme:</strong> Get active — coastal scenery in the morning, adrenaline on the water in the afternoon</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:30 AM</strong> – Breakfast at a local café (Rue Sade area or Cours Masséna)</li>\n<li><strong>9:30 AM–12:30 PM</strong> – <strong>Sentier du Littoral, Cap d'Antibes coastal walk</strong>\n<ul>\n<li>One of the best walks on the entire Riviera — dramatic limestone cliffs, hidden coves, crystal clear water</li>\n<li>~2 hours at a relaxed pace; bring swimwear as there are multiple spots to jump in</li>\n<li>Start at Plage de la Garoupe and follow the coastal path south around the Cap</li>\n<li>Views back to Antibes Old Town and out to the Îles de Lérins</li>\n<li><em>Note: In summer 2025 the white segment near Baie des Milliardaires was partially closed for renovation — check current status before going</em></li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:00 PM</strong> – Lunch back in Antibes Old Town (post-walk reward)\n<ul>\n<li><em>Suggested:</em> <strong>Tête de Lard</strong> (casual, cheerful) or <strong>L'Arome</strong> (Provençal, good value)</li>\n</ul></li></ul>\n<p><strong>Afternoon — Watersports at Juan-les-Pins:</strong></p>\n<ul>\n<li><strong>3:00–6:00 PM</strong> – Head to Juan-les-Pins beachfront (~15 min walk or short bus from Antibes)\n<ul>\n<li><strong>Snorkelling with Seabob</strong> at La Garoupe Bay — underwater scooters are a big hit with teenagers; guided sessions available</li>\n<li><strong>Stand-up paddleboard hire</strong> from Cape Kayak or the sailing club at Salis Beach (€15–20/hr)</li>\n<li>Or simply swim and explore the rocky coastline by the Cap</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Dinner in Antibes\n<ul>\n<li><em>Suggested:</em> <strong>Pizzeria La Mamma</strong> (fun, relaxed, perfect after an active day) or <strong>Les Vins du Coin</strong> (wine bar with sharing plates)</li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Antibes</p>\n<hr>"}, {"label": "Day 3", "name": "NICE DAY TRIP", "heading": "DAY 3 – SATURDAY, 4 JULY: NICE DAY TRIP", "html": "<p><strong>Theme:</strong> Cosmopolitan Riviera — urban energy, markets, beach</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:30 AM</strong> – Train from Antibes to Nice (~25 min, €12–15 per person)</li>\n<li><strong>9:15–11:00 AM</strong> – <strong>Vieux Nice</strong> exploration\n<ul>\n<li>Colourful Baroque architecture, narrow alleyways, Cours Saleya flower and food market (Saturday is especially lively)</li>\n<li>Street food: socca (chickpea pancake), pan bagnat — ideal for a walking breakfast/snack</li>\n<li>Boys will enjoy the urban buzz and market atmosphere</li>\n</ul></li>\n<li><strong>11:00 AM–12:30 PM</strong> – Walk up to <strong>Colline du Château</strong> (Castle Hill)\n<ul>\n<li>Free entry; panoramic views over the Promenade, old port and Baie des Anges</li>\n<li>Take the lift or climb the steps; good photo spot</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch in Vieux Nice\n<ul>\n<li><em>Suggested:</em> <strong>Salière</strong> (proper Niçoise cuisine, good value), <strong>La Maison de Marie</strong> (rustic, reliable), or grab food from the market stalls on Cours Saleya</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>2:30–5:30 PM</strong> – <strong>Promenade des Anglais</strong> & beach\n<ul>\n<li>Walk the famous promenade; the boys can rent bikes along the seafront</li>\n<li>Swim at Plage de Nice (pebbly but the water is gorgeous in July)</li>\n<li>Ice cream stop — look for Fenocchio in Old Town (legendary, 100+ flavours)</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Train back to Antibes</li>\n<li><strong>7:30 PM</strong> – Dinner in Antibes\n<ul>\n<li><em>Suggested:</em> <strong>Café Poulailler</strong> (lively, relaxed) or <strong>Le Bacon</strong> (upscale seafood — worth treating yourselves)</li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Antibes</p>\n<hr>"}, {"label": "Day 4", "name": "CANNES + ÎLES DE LÉRINS BOAT TRIP", "heading": "DAY 4 – SUNDAY, 5 JULY: CANNES + ÎLES DE LÉRINS BOAT TRIP", "html": "<p><strong>Theme:</strong> The full Riviera experience — glamour, islands, snorkelling</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:30 AM</strong> – Train from Antibes to Cannes (~15 min, €5–7)</li>\n<li><strong>9:00–10:30 AM</strong> – Quick explore of <strong>Cannes</strong>\n<ul>\n<li>Walk the Croisette Boulevard; photo stop at the Palais des Festivals (red carpet steps)</li>\n<li>Wander Vieux Cannes (Le Suquet hill) for views and local atmosphere</li>\n</ul></li></ul>\n<p><strong>Mid-Morning — Îles de Lérins boat trip (highlight of the week):</strong></p>\n<ul>\n<li><strong>10:30 AM</strong> – Board ferry or private boat from Cannes port to <strong>Îles de Lérins</strong>\n<ul>\n<li>Ferries run regularly from Cannes port; ~15 min crossing</li>\n<li><em>Recommended:</em> Book a private half-day boat charter from Antibes or Cannes for a family of 4 — skipper takes you to the best swim and snorkel spots between the islands (~€200–300 for a half-day split four ways)</li>\n<li><strong>Île Sainte-Marguerite</strong> — hidden coves, crystal-clear water, snorkelling, walking trails; no cars on the island</li>\n<li><strong>Île Saint-Honorat</strong> — 1,600-year-old Cistercian monastery; monks produce award-winning organic wine (gift shop open to visitors)</li>\n<li>Snack food boats come to the beaches in summer — you can order pizza and sandwiches and wine from the water</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:00 PM</strong> – Picnic on the island or eat at the island café; or back in Cannes\n<ul>\n<li><em>Suggested if back in Cannes:</em> <strong>Le Squaw</strong> (casual, sea views) or <strong>Gastromimétis</strong> (upscale casual)</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Beach time in Cannes (Plage du Midi) or head back to Antibes for a swim at Gravette</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:00–6:30 PM</strong> – Train back to Antibes</li>\n<li><strong>7:30 PM</strong> – Dinner\n<ul>\n<li><em>Suggested:</em> <strong>Chez Fred</strong> (good seafood, casual) or <strong>Comptoir Méditerranée</strong> (Mediterranean plates)</li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Antibes</p>\n<hr>"}, {"label": "Day 5", "name": "WATERSPORTS DAY — JET SKIS, WAKEBOARD & PARASAILING", "heading": "DAY 5 – MONDAY, 6 JULY: WATERSPORTS DAY — JET SKIS, WAKEBOARD & PARASAILING", "html": "<p><strong>Theme:</strong> Maximum adrenaline — the teenage highlight of the week</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Leisurely breakfast (you'll want energy for today)</li>\n<li><strong>10:00 AM</strong> – Head to Juan-les-Pins beachfront (~15 min walk or short bus)</li>\n</ul>\n<p><strong>Mid-Morning–Afternoon — Watersports session:</strong></p>\n<ul>\n<li><strong>10:30 AM–1:00 PM</strong> – <strong>Glisse Paradise</strong> (based at Cocody Beach, Juan-les-Pins)\n<ul>\n<li>Full menu: jet skis, waterskiing, wakeboard, wakesurf, parasailing, canoe, paddleboard</li>\n<li>They adapt to all levels — perfect for a mixed-ability family</li>\n<li><em>Suggested combination:</em> Jet ski tour + wakeboard session + parasailing for the boys</li>\n<li>Budget: €50–120 per person depending on activities chosen; book ahead in July</li>\n</ul></li>\n<li><strong>Alternative / add-on:</strong> <strong>Efoiling at Cap d'Antibes</strong> — electric hydrofoil surfing; genuinely futuristic and a huge hit with teenagers; introductory sessions available for beginners</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:30–2:30 PM</strong> – Lunch in Juan-les-Pins (beachside)\n<ul>\n<li><em>Suggested:</em> Beachside café or restaurant on the Promenade Amiral Courbet</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–6:00 PM</strong> – Free beach time; swim, recover, people-watch\n<ul>\n<li>Juan-les-Pins has a livelier beach scene than Antibes Old Town — good music, beach bars, summer atmosphere</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Dinner back in Antibes\n<ul>\n<li><em>Suggested:</em> <strong>Le Safari</strong> (upscale casual, treat after a big day) or <strong>Mickaël Féval</strong> (Michelin-starred seafood — book well ahead, worth it)</li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Antibes</p>\n<hr>"}, {"label": "Day 6", "name": "ANTIBES RELAXED DAY — PICASSO, PORT VAUBAN & BEACH", "heading": "DAY 6 – TUESDAY, 7 JULY: ANTIBES RELAXED DAY — PICASSO, PORT VAUBAN & BEACH", "html": "<p><strong>Theme:</strong> Slow down, explore what's on the doorstep, recharge after a big week</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:30 AM</strong> – Leisurely breakfast at a café on Cours Masséna</li>\n<li><strong>10:00 AM–12:00 PM</strong> – <strong>Musée Picasso (Château Grimaldi)</strong>\n<ul>\n<li>Housed in a 12th-century château right on the ramparts above the sea</li>\n<li>Picasso spent the summer of 1946 here and donated 23 paintings and over 70 drawings to the town — the collection is genuinely special</li>\n<li>Entry ~€8 per person; the terrace alone with its sea views is worth the visit</li>\n<li><em>If the boys aren't art fans:</em> skip inside and just walk the ramparts and cliff-top gardens around the château for the views</li>\n</ul></li></ul>\n<p><strong>Late Morning:</strong></p>\n<ul>\n<li><strong>12:00–1:00 PM</strong> – Wander <strong>Port Vauban</strong> — the largest marina in Europe\n<ul>\n<li>The Billionaires' Quay is lined with extraordinary superyachts; worth a slow stroll</li>\n<li>Good photo spot and free entertainment</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Relaxed lunch in Old Town\n<ul>\n<li><em>Suggested:</em> <strong>Tête de Lard</strong> (casual, fun atmosphere) or <strong>L'Arome</strong> (Provençal, good value)</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–6:00 PM</strong> – Extended beach time\n<ul>\n<li><strong>Plage de la Garoupe</strong> on Cap d'Antibes is worth the 20-min bus ride — wider, less crowded than the town beaches, good snorkelling off the rocks at the eastern end</li>\n<li>Or stay local at <strong>Plage de la Gravette</strong> for a lazy final full afternoon swim</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:00 PM</strong> – Aperitif at a harbour terrace; watch the boats</li>\n<li><strong>8:00 PM</strong> – Dinner\n<ul>\n<li><em>Suggested:</em> <strong>Le Safari</strong> (upscale casual, good for a group) or <strong>Café Poulailler</strong> (lively, relaxed)</li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Antibes</p>\n<hr>"}, {"label": "Day 7", "name": "MARCHÉ PROVENÇAL, BEACH & FAREWELL DINNER", "heading": "DAY 7 – WEDNESDAY, 8 JULY: MARCHÉ PROVENÇAL, BEACH & FAREWELL DINNER", "html": "<p><strong>Theme:</strong> Slow, local, savour the last family day</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00 AM</strong> – <strong>Marché Provençal on Cours Masséna</strong>\n<ul>\n<li>One of the best markets on the Riviera; Wednesday is bustling</li>\n<li>Fresh produce, flowers, local cheeses, olives, Provençal souvenirs</li>\n<li>Buy supplies for a picnic or just browse and soak up the atmosphere</li>\n</ul></li>\n<li><strong>9:30 AM</strong> – Breakfast café stop on Cours Masséna\n<ul>\n<li><em>Suggested:</em> <strong>Café de la Place</strong> or any terrace overlooking the market</li>\n</ul></li></ul>\n<p><strong>Late Morning:</strong></p>\n<ul>\n<li><strong>11:00 AM–1:00 PM</strong> – Free time; last wander around Antibes\n<ul>\n<li>Boys might revisit favourite spots; browse the ramparts, Port Vauban (largest marina in Europe — the superyachts are extraordinary), or the old town streets</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Relaxed lunch\n<ul>\n<li><em>Suggested:</em> Picnic with market purchases at <strong>Plage de la Gravette</strong>, or sit-down at <strong>Le Vauban</strong> (waterfront terrace)</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>2:30–6:00 PM</strong> – Extended final beach session\n<ul>\n<li>Swimming, photos, ice cream — enjoy the Mediterranean calm</li>\n<li><em>Optional:</em> Rent kayaks or paddleboards from the Antibes sailing club at Salis Beach for one last water adventure (~€15–20/hr)</li>\n</ul></li></ul>\n<p><strong>Evening — FAMILY FAREWELL DINNER:</strong></p>\n<ul>\n<li><strong>7:00 PM</strong> – Pre-dinner walk along the harbour; watch the sunset over the Baie des Anges</li>\n<li><strong>8:00 PM</strong> – <strong>Special farewell dinner</strong> — book ahead, make it memorable\n<ul>\n<li><em>Top choice:</em> <strong>Mickaël Féval</strong> (Michelin-starred; the best table in Antibes; reserve 2–3 weeks ahead)</li>\n<li><em>Alternative:</em> <strong>Le Bacon</strong> (iconic seafood restaurant on Cap d'Antibes; legendary bouillabaisse; book ahead)</li>\n<li><em>More casual:</em> <strong>L'Arome</strong> (reliable Provençal, good atmosphere, easier booking)</li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Antibes (boys pack tonight — early start tomorrow)</p>\n<hr>"}, {"label": "Day 8", "name": "BOYS' DEPARTURE & ADULT TRANSITION", "heading": "DAY 8 – THURSDAY, 9 JULY: BOYS' DEPARTURE & ADULT TRANSITION", "html": "<p><strong>Theme:</strong> Goodbye & pivot to couple's trip</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>6:00 AM</strong> – Breakfast, packing, final Antibes wander</li>\n<li><strong>7:00–07:45 AM</strong> – Travel to Nice Airport\n<ul>\n<li><strong>Via Train:</strong> Antibes–Nice (~25 min), then bus/taxi to airport (~20 min)</li>\n<li><strong>Via Car Rental (if keeping):</strong> Direct ~45 min</li>\n</ul></li>\n<li><strong>10:45 AM</strong> – Boys' flight departs Nice</li>\n</ul>\n<h2>PART 2A: AIX-EN-PROVENCE (09–19 JULY) – URBAN PROVENCE & COUPLE'S TIME</h2>\n<p><strong>Theme:</strong> Café culture, markets, day trips to Avignon/Arles/Marseille <strong>Accommodation:</strong> Central Aix (near Cours Mirabeau or Old Town) <strong>Transport Strategy:</strong> SNCF for day trips; walking locally; buses for suburbs <strong>Late Morning–Afternoon (Parents only now):</strong></p>\n<ul>\n<li><strong>11:00–12:15 AM</strong> – Travel from Antibes to Aix-en-Provence\n<ul>\n<li><strong>Direct train:</strong> Antibes → Aix-en-Provence (~2 hours, €30–40, some changes required)</li>\n<li><strong>Recommended route:</strong> Antibes → Cannes (15 min) → Marseille (2 hours) → Aix-en-Provence (35 min) = ~3 hours total + connections</li>\n<li><em>Alternative:</em> Car rental Antibes–Aix (~2.5 hours direct via A8/A9; scenic route with option to stop)</li>\n</ul></li>\n<li><strong>2:00–3:00 PM</strong> – Arrive Aix, check into accommodation</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:30–5:00 PM</strong> – Explore Aix Old Town at leisure\n<ul>\n<li>Wander around Cathedral, Rue Gaston de Saporta</li>\n<li>Sit at café on Cours Mirabeau (famous tree-lined boulevard)</li>\n<li>Browse shops, galleries, markets (Marché Aux Fleurs)</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Rest at accommodation</li>\n<li><strong>7:30 PM</strong> – Welcome-to-Aix dinner\n<ul>\n<li><em>Suggested:</em> <strong>Mickaël Féval's (Aix branch if exists)</strong>, <strong>Fabrice Donnée</strong> (upscale casual), or <strong>Le Jasmin</strong> (Provençal)</li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<hr>"}, {"label": "Day 9", "name": "AIX-EN-PROVENCE DEEP DIVE", "heading": "DAY 9 – FRIDAY, 10 JULY: AIX-EN-PROVENCE DEEP DIVE", "html": "<p><strong>Theme:</strong> Markets, café culture, Cézanne landscapes</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00 AM</strong> – Marché Aux Fleurs (flower market, daily except Monday)</li>\n<li><strong>8:30–9:30 AM</strong> – Breakfast at café\n<ul>\n<li><em>Suggested:</em> <strong>Café de la Madeleine</strong> or <strong>Les Deux Garçons</strong> (historic café)</li>\n</ul></li></ul>\n<p><strong>Late Morning:</strong></p>\n<ul>\n<li><strong>10:00 AM–12:30 PM</strong> – Musée Granet or Cathedral\n<ul>\n<li>Musée Granet: Art museum with Cézanne works</li>\n<li>Or leisurely walk Cours Mirabeau, people-watch</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Market-fresh lunch\n<ul>\n<li><em>Suggested:</em> <strong>Pierre Reboul</strong> (Michelin-starred; book ahead) or <strong>Manon les Suds</strong> (market-style, casual)</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Optional: Studio of Cézanne (Atelier de Cézanne)\n<ul>\n<li>Small museum in artist's studio (~20 min walk from centre)</li>\n<li>Good for art lovers; skip if not interested</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Pre-dinner aperitif at Cours Mirabeau café</li>\n<li><strong>7:30 PM</strong> – Dinner\n<ul>\n<li><em>Suggested:</em> <strong>Caruso</strong> (Italian fine dining), <strong>Edouard Loubet</strong> (Michelin), or <strong>Mickaël Féval</strong> (if location exists)</li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<hr>"}, {"label": "Day 10", "name": "AVIGNON DAY TRIP", "heading": "DAY 10 – SATURDAY, 11 JULY: AVIGNON DAY TRIP", "html": "<p><strong>Theme:</strong> Papal palace, medieval walls, Rhône culture</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00 AM</strong> – Train from Aix to Avignon (~35 min, €15–20)</li>\n<li><strong>9:00 AM–12:30 PM</strong> – Explore Avignon Old Town\n<ul>\n<li>Palais des Papes (UNESCO; impressive Gothic structure; book tickets ahead)</li>\n<li>Pont d'Avignon (famous bridge; scenic)</li>\n<li>Old town walls & narrow streets</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Avignon lunch\n<ul>\n<li><em>Suggested:</em> <strong>La Mirande</strong> (upscale Provençal), <strong>Numero 75</strong> (casual), or riverside café</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Musée du Petit Palais or Pont d'Avignon area\n<ul>\n<li>Art museum or leisure walk along Rhône</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Train back to Aix (~35 min)</li>\n<li><strong>7:30 PM</strong> – Casual dinner in Aix\n<ul>\n<li><em>Suggested:</em> <strong>Le Jasmin</strong> (Provençal) or <strong>Café Rouge</strong> (casual)</li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<hr>"}, {"label": "Day 11", "name": "ARLES DAY TRIP", "heading": "DAY 11 – SUNDAY, 12 JULY: ARLES DAY TRIP", "html": "<p><strong>Theme:</strong> Van Gogh heritage, Roman ruins, artistic town</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00 AM</strong> – Train from Aix to Arles (~50 min, €15–20)</li>\n<li><strong>9:15 AM–12:30 PM</strong> – Arles Exploration\n<ul>\n<li>Place du Forum & Café de la Nuit (Van Gogh's Starry Night café)</li>\n<li>Roman theatre & amphitheatre (Les Arènes)</li>\n<li>Musée de l'Arles Antique (Roman archaeology; excellent)</li>\n<li>Narrow streets, artist vibe</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Arles lunch\n<ul>\n<li><em>Suggested:</em> <strong>La Maison du Boeuf</strong> (Camargue beef), <strong>L'Arlésienne</strong> (Provençal), or <strong>Au Brin de Thym</strong> (casual)</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Optional: Musée de l'Arles et de la Provence (local history) or leisurely café time\n<ul>\n<li>Or stroll towards Rhône riverside</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Train back to Aix (~50 min)</li>\n<li><strong>7:30 PM</strong> – Dinner in Aix\n<ul>\n<li><em>Suggested:</em> <strong>Mickaël Féval</strong> (if available), <strong>Fabrice Donnée</strong>, or <strong>Caruso</strong></li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<hr>"}, {"label": "Day 12", "name": "MARSEILLE DAY TRIP (BASTILLE DAY)", "heading": "DAY 12 – MONDAY, 13 JULY: MARSEILLE DAY TRIP (BASTILLE DAY)", "html": "<p><strong>Theme:</strong> Urban Mediterranean, French national day atmosphere, Old Port charm</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00 AM</strong> – Train from Aix to Marseille (~35 min, €12–15)</li>\n<li><strong>9:15 AM–1:00 PM</strong> – Marseille Vieux-Port & Le Panier\n<ul>\n<li>Walk Old Port, watch fishermen & boats</li>\n<li>Climb to Basilique Notre-Dame de la Garde (cable car or steps; panoramic views)</li>\n<li>Explore Le Panier district (colourful houses, galleries, cafés)</li>\n<li>Note: Bastille Day (14 July) means crowds, celebrations, possible parades</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Seafood lunch at Vieux-Port\n<ul>\n<li><em>Suggested:</em> <strong>Chez Fonfon</strong> (legendary bouillabaisse), <strong>Le Petit Galinier</strong> (casual, colourful), or <strong>Café de la Samaritaine</strong></li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Museum option or leisure stroll\n<ul>\n<li>Musée de la Civilisation de l'Europe Méditerranéenne (MuCEM; modern, good for architecture lovers) or leisurely walk</li>\n</ul></li></ul>\n<p><strong>Evening (Bastille Day):</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Train back to Aix (~35 min) OR stay for evening festivities\n<ul>\n<li>If staying: Pre-dinner aperitif, dinner, Bastille Day fireworks on Vieux-Port (typically 10–11 PM)</li>\n<li>If returning: Simple dinner in Aix</li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<hr>"}, {"label": "Day 13", "name": "BASTILLE DAY", "heading": "DAY 13 – TUESDAY, 14 JULY: BASTILLE DAY", "html": "<p><strong>Theme:</strong> France's national day — military parade, market, Provençal picnic & fireworks at the Rotonde</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Watch the <strong>military parade</strong> through Aix (typically through the town centre; check locally for exact route and timing)</li>\n<li><strong>10:00 AM</strong> – Coffee and croissant at a Cours Mirabeau terrace; soak up the national day atmosphere</li>\n</ul>\n<p><strong>Late Morning — Picnic Supplies:</strong></p>\n<ul>\n<li><strong>10:30 AM–12:30 PM</strong> – Gather picnic supplies from the market and local shops\n<ul>\n<li><strong>Place Richelme market</strong> (open daily, morning): bread, cheese, charcuterie, fruit</li>\n<li>A good cave (wine shop) on or near Cours Mirabeau for a bottle of Provence rosé or two</li>\n<li><em>Suggested shops:</em> <strong>La Cave du Félibrige</strong> or any fromagerie/charcuterie in the Old Town</li>\n<li>This is the French way to do Bastille Day — don't overthink it, just buy what looks good</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>12:30–2:00 PM</strong> – Relax at the accommodation or find a shaded square; enjoy your market haul</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>2:30–5:30 PM</strong> – Unstructured time\n<ul>\n<li>Nap, wander, browse the streets; the town has a festive, unhurried energy today</li>\n<li>Note: most museums will be closed; tourist shops may be open morning only</li>\n</ul></li></ul>\n<p><strong>Early Evening — Set Up for the Night:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Head to the <strong>Rotonde fountain area</strong> to find a good spot\n<ul>\n<li>The Cours Mirabeau and Rotonde fill up steadily from early evening; earlier is better for a comfortable pitch</li>\n<li>Bring a blanket, your remaining picnic supplies, and whatever wine is left</li>\n</ul></li>\n<li><strong>7:00–9:30 PM</strong> – The <strong>Cours Mirabeau</strong> fills with music and dance performances from local artists; the <em>bal populaire</em> (communal street dancing) gets going — join in or watch from a café terrace</li>\n<li><strong>9:30 PM</strong> – Top up drinks; settle in near the Rotonde for the best fireworks view</li>\n</ul>\n<p><strong>Evening — Fireworks:</strong></p>\n<ul>\n<li><strong>~10:00–11:00 PM</strong> – <strong>Fireworks display over the Rotonde fountain</strong> — the centrepiece of Aix's Bastille Day\n<ul>\n<li>Free entry; arrive well before 10pm for a good spot</li>\n<li><em>Note:</em> In extreme heat, Provence fireworks can occasionally be cancelled as a fire precaution — worth a quick check with the local tourist office on the day</li>\n</ul></li>\n<li><strong>Post-fireworks</strong> – Roads and squares will be busy for 30–45 min after; no rush, let the crowds thin over a last drink at a nearby bar</li>\n</ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<hr>"}, {"label": "Day 14", "name": "TO BE PLANNED", "heading": "DAY 14 – WEDNESDAY, 15 JULY: TO BE PLANNED", "html": "<p><em>Content coming soon.</em></p>"}, {"label": "Day 15", "name": "TO BE PLANNED", "heading": "DAY 15 – THURSDAY, 16 JULY: TO BE PLANNED", "html": "<p><em>Content coming soon.</em></p>"}, {"label": "Day 16", "name": "TO BE PLANNED", "heading": "DAY 16 – FRIDAY, 17 JULY: TO BE PLANNED", "html": "<p><em>Content coming soon.</em></p>"}, {"label": "Day 17", "name": "TO BE PLANNED", "heading": "DAY 17 – SATURDAY, 18 JULY: TO BE PLANNED", "html": "<p><em>Content coming soon.</em></p>"}, {"label": "Day 18", "name": "Travel to Hostellerie du château des fines roches", "heading": "DAY 18 – SUNDAY, 19 JULY: Travel to Hostellerie du château des fines roches - châteauneuf-du-pape **Morning/Midday:", "html": "<p><strong>Theme:</strong> Transition to countryside retreat</p>\n<ul>\n<li><strong>9:00 AM</strong> – Leisurely breakfast in Aix</li>\n<li><strong>10:00–11:00 AM</strong> – Travel to Hostellerie du château des fines roches - châteauneuf-du-pape\n<ul>\n<li><strong>Route:</strong> Aix →</li>\n</ul></li>\n<li>*</li>\n</ul>\n<p>-</p>\n<hr>"}, {"label": "Day 19", "name": "FINAL châteauneuf-du-pape DAY & DEPARTURE TO CASSIS", "heading": "DAY 19 – MONDAY, 20 JULY: FINAL châteauneuf-du-pape DAY & DEPARTURE TO CASSIS", "html": "<p><strong>Theme:</strong> Transition from countryside to Mediterranean coast</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Final leisurely breakfast at Château</li>\n<li><strong>10:00 AM–12:00 PM</strong> – Last Château activities\n<ul>\n<li>Final pool time, stroll grounds, or revisit favourite village spot</li>\n</ul></li></ul>\n<p><strong>Midday:</strong></p>\n<ul>\n<li><strong>12:30 PM</strong> – Check out of Château</li>\n<li><strong>1:00–2:00 PM</strong> – Lunch en route</li>\n</ul>\n<p><strong>Afternoon Travel:</strong></p>\n<ul>\n<li><strong>2:30 PM</strong> – Depart châteauneuf-du-pape  for Cassis\n<ul>\n<li><strong>Route:</strong></li>\n</ul></li></ul>\n<p><strong>Arrival:</strong></p>\n<ul>\n<li><strong>4:00–4:30 PM</strong> – Check into Cassis accommodation\n<ul>\n<li><em>Recommended area:</em> Harbour/waterfront location with sea views</li>\n</ul></li>\n<li><strong>5:00–6:00 PM</strong> – Explore Cassis harbour & waterfront\n<ul>\n<li>Walk to marina, watch boats, soak in Mediterranean atmosphere, find dinner spot</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Welcome-to-Cassis dinner\n<ul>\n<li><em>Suggested:</em> <strong>Chez Padovani</strong> (seafood, upscale), <strong>La Presqu'île</strong> (casual), or <strong>Restaurant du Port</strong></li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Cassis</p>\n<hr>\n<h2>PART 3A: CASSIS (20–25 JULY) – MEDITERRANEAN DRAMA</h2>\n<p><strong>Theme:</strong> Calanques, coastal beauty, boating, seafood</p>\n<p><strong>Accommodation:</strong> Cassis harbour area or village centre <strong>Transport Strategy:</strong> Car (from Château) or train/bus from Aix; local walking & boat tours</p>\n<hr>"}, {"label": "Day 20", "name": "CALANQUES BOAT TOUR & COASTAL DAY", "heading": "DAY 20 – TUESDAY, 21 JULY: CALANQUES BOAT TOUR & COASTAL DAY", "html": "<p><strong>Theme:</strong> Dramatic coastline, swimming, Mediterranean beauty</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:30 AM</strong> – Breakfast in Cassis</li>\n<li><strong>9:30–11:00 AM</strong> – Calanques Boat Tour\n<ul>\n<li><strong>Book ahead:</strong> Various operators offer 2–3 hour boat tours</li>\n<li>Visit Calanques d'En-Vau, Port-Miou, Port-Pin (deep fjord-like inlets)</li>\n<li>Stunning limestone cliffs, turquoise water, swimming stops</li>\n<li>Cost: €20–35 per person</li>\n</ul></li></ul>\n<p><strong>Late Morning/Lunch:</strong></p>\n<ul>\n<li><strong>12:00–1:30 PM</strong> – Lunch in Cassis\n<ul>\n<li><em>Suggested:</em> <strong>Chez Padovani</strong> (book for lunch), <strong>La Table de Margot</strong> (casual), or harbour-side café</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>2:30–5:30 PM</strong> – Beach time at Plage de Cassis or explore Port-Miou hiking\n<ul>\n<li>Swim, relax, explore coves</li>\n<li>Optional: Short cliff-top walk overlooking Calanques (1–2 hours, scenic)</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Rest/freshen up</li>\n<li><strong>7:30 PM</strong> – Dinner (seafood focus)\n<ul>\n<li><em>Suggested:</em> <strong>Chez Padovani</strong>, <strong>Clos Sainte-Magdeleine</strong> (wine + seafood), or <strong>Restaurant du Port</strong></li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Cassis</p>\n<hr>"}, {"label": "Day 21", "name": "CASSIS LEISURE DAY OR BANDOL WINE EXPLORATION", "heading": "DAY 21 – WEDNESDAY, 22 JULY: CASSIS LEISURE DAY OR BANDOL WINE EXPLORATION", "html": "<p><strong>Theme:</strong> Relaxation or wine/coastal exploration</p>\n<p><strong>Option A – Beach & Leisure (Recommended):</strong></p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Sleep in, café breakfast</li>\n<li><strong>10:00 AM–12:30 PM</strong> – Beach time (Plage de Cassis or nearby coves)\n<ul>\n<li>Swim, relax, people-watch</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Harbour-side lunch\n<ul>\n<li><em>Suggested:</em> <strong>La Presqu'île</strong>, <strong>Chez Padovani</strong>, or café</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–6:00 PM</strong> – Leisurely exploration\n<ul>\n<li>Walk old town, galleries, cafés</li>\n<li>Sit on waterfront, watch sunset</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Special dinner (upscale)\n<ul>\n<li><em>Suggested:</em> <strong>Clos Sainte-Magdeleine</strong> (Michelin; reserve ahead) or <strong>Chez Padovani</strong></li>\n</ul></li></ul>\n<hr>\n<p><strong>Option B – Bandol Wine Exploration:</strong></p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Breakfast, prepare for wine country</li>\n<li><strong>10:00 AM–1:00 PM</strong> – Drive to Bandol wine region (~20 min east of Cassis)\n<ul>\n<li>Visit 2–3 wineries (e.g., <strong>Château de Pibarnon</strong>, <strong>Domaine Tempier</strong>)</li>\n<li>Tasting, lunch, scenic views of vineyards</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Wine region lunch\n<ul>\n<li><em>Suggested:</em> Winery restaurant or <strong>Mas de la Fouque</strong> (Bandol)</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Return to Cassis; beach time or rest</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Dinner in Cassis\n<ul>\n<li><em>Suggested:</em> <strong>Clos Sainte-Magdeleine</strong> or <strong>Chez Padovani</strong></li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Cassis</p>\n<hr>"}, {"label": "Day 22", "name": "TO BE PLANNED", "heading": "DAY 22 – THURSDAY, 23 JULY: TO BE PLANNED", "html": "<p><em>Content coming soon.</em></p>"}, {"label": "Day 23", "name": "TO BE PLANNED", "heading": "DAY 23 – FRIDAY, 24 JULY: TO BE PLANNED", "html": "<p><em>Content coming soon.</em></p>"}, {"label": "Day 24", "name": "CASSIS TO MARSEILLE TRANSITION", "heading": "DAY 24 – SATURDAY, 25 JULY: CASSIS TO MARSEILLE TRANSITION", "html": "<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Final Cassis breakfast</li>\n<li><strong>10:00–11:30 AM</strong> – Last harbour walk or beach visit</li>\n</ul>\n<p><strong>Midday Travel:</strong></p>\n<ul>\n<li><strong>12:00 PM</strong> – Check out, depart for Marseille\n<ul>\n<li><strong>Route:</strong> Cassis → Marseille (~1 hour by car or train)</li>\n<li>If returning car: drop at Marseille train station or car rental office</li>\n</ul></li></ul>\n<p><strong>Arrival:</strong></p>\n<ul>\n<li><strong>1:00–1:30 PM</strong> – Check into Marseille accommodation\n<ul>\n<li><em>Recommended area:</em> Vieux-Port/Le Panier (vibrant, harbour views)</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>2:00–5:00 PM</strong> – Explore Marseille\n<ul>\n<li>Vieux-Port waterfront, Le Panier district</li>\n<li><strong>MuCEM</strong> (Museum of Mediterranean Civilization; modern architecture, excellent views)</li>\n<li>Café stops, shopping</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:30 PM</strong> – Aperitif on Vieux-Port</li>\n<li><strong>7:30 PM</strong> – Welcome-to-Marseille dinner\n<ul>\n<li><em>Suggested:</em> <strong>Chez Fonfon</strong> (legendary bouillabaisse), <strong>Le Petit Galinier</strong> (casual, colourful), or <strong>Café de la Samaritaine</strong></li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Marseille</p>\n<hr>\n<h2>PART 3B: MARSEILLE (25–28 JULY) – URBAN MEDITERRANEAN FINALE</h2>\n<p><strong>Theme:</strong> Urban energy, seafood, art, island excursions</p>\n<p><strong>Accommodation:</strong> Vieux-Port or Le Panier district</p>\n<hr>"}, {"label": "Day 25", "name": "MARSEILLE DEEP DIVE", "heading": "DAY 25 – SUNDAY, 26 JULY: MARSEILLE DEEP DIVE", "html": "<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:30 AM</strong> – Café breakfast in Le Panier</li>\n<li><strong>9:00 AM–12:30 PM</strong> – Explore Le Panier District\n<ul>\n<li>Narrow colourful streets, street art, galleries</li>\n<li>Cathédrale La Major (impressive 19th-century structure)</li>\n<li>Browse local shops, produce stands</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch in Le Panier\n<ul>\n<li><em>Suggested:</em> <strong>L'Épée de Bois</strong> (casual, colourful), <strong>Chez Etienne</strong> (traditional Provençal), or café</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Museum option or leisure stroll\n<ul>\n<li><strong>MUCEM</strong> (modern Mediterranean museum; worth 1–2 hours)</li>\n<li><strong>Musée de la Vieille Charité</strong> (Renaissance building, art/ethnography)</li>\n<li>Or simply walk Vieux-Port, watch boats, sit at café</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:30 PM</strong> – Aperitif on waterfront</li>\n<li><strong>7:30 PM</strong> – Dinner (focus on seafood & Provençal flavours)\n<ul>\n<li><em>Suggested:</em> <strong>Chez Fonfon</strong> (book ahead), <strong>Cote Ouest</strong> (casual, upscale), or <strong>Restaurant Mama Shelter</strong> (modern)</li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Marseille</p>\n<hr>"}, {"label": "Day 26", "name": "FRIOUL ISLANDS OR LEISURE DAY", "heading": "DAY 26 – MONDAY, 27 JULY: FRIOUL ISLANDS OR LEISURE DAY", "html": "<p><strong>Theme:</strong> Island escape or Marseille relaxation</p>\n<p><strong>Option A – Frioul Islands Boat Trip (Recommended):</strong></p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:30 AM</strong> – Breakfast</li>\n<li><strong>9:30–10:30 AM</strong> – Ferry from Marseille Vieux-Port to Îles du Frioul\n<ul>\n<li>Ferry cost: €10–15 per person each way</li>\n<li>20–30 min journey; daily service</li>\n</ul></li></ul>\n<p><strong>Late Morning–Afternoon:</strong></p>\n<ul>\n<li><strong>11:00 AM–4:00 PM</strong> – Îles du Frioul exploration\n<ul>\n<li>Île d'If: Château d'If (Dumas, Monte Cristo fame; historic fortress, optional entry)</li>\n<li>Île de Ratonneau: quieter, fewer tourists, good for swimming/picnics</li>\n<li>Bring lunch/picnic items from Marseille or eat at island café</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:00 PM</strong> – Island café (basic but atmospheric) or picnic</li>\n</ul>\n<p><strong>Late Afternoon:</strong></p>\n<ul>\n<li><strong>4:30 PM</strong> – Ferry back to Marseille (~30 min)</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Rest at accommodation</li>\n<li><strong>7:30 PM</strong> – Casual dinner\n<ul>\n<li><em>Suggested:</em> <strong>Le Petit Galinier</strong>, <strong>Chez Etienne</strong>, or café</li>\n</ul></li></ul>\n<hr>\n<p><strong>Option B – Marseille Leisurely Day:</strong></p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Sleep in, café breakfast</li>\n<li><strong>10:00 AM–12:30 PM</strong> – Optional: Basilique Notre-Dame de la Garde (cable car or steps; panoramic views)\n<ul>\n<li>Or leisurely walk Corniche (coastal promenade)</li>\n</ul></li></ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch\n<ul>\n<li><em>Suggested:</em> <strong>Chez Fonfon</strong>, <strong>Cote Ouest</strong>, or waterfront café</li>\n</ul></li></ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Museum, shopping, café lounge\n<ul>\n<li>MUCEM, galleries, or simply relax</li>\n</ul></li></ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Dinner\n<ul>\n<li><em>Suggested:</em> <strong>Chez Fonfon</strong> or <strong>Cote Ouest</strong></li>\n</ul></li></ul>\n<p><strong>Overnight:</strong> Marseille</p>\n<hr>"}, {"label": "Day 27", "name": "DEPARTURE", "heading": "DAY 27 – TUESDAY, 28 JULY: DEPARTURE", "html": "<p><strong>Very Early Morning:</strong></p>\n<ul>\n<li><strong>7:00 AM</strong> – Wake up, quick breakfast, final packing check</li>\n<li><strong>8:00 AM</strong> – Depart accommodation for airport\n<ul>\n<li>Marseille Provence Airport (MRS) ~30 km east of city</li>\n<li>Travel time: 45 min–1 hour by car/taxi/bus/train</li>\n<li>Arrive 8:45–9:00 AM (for 10:55 AM departure)</li>\n</ul></li></ul>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:45–9:15 AM</strong> – Arrive airport, check in</li>\n<li><strong>10:55 AM</strong> – Flight departs Marseille for home</li>\n</ul>\n<hr>\n<h2>LOGISTICS SUMMARY</h2>\n<h3><strong>Flights</strong></h3>\n<table>\n<thead><tr><th>Leg</th><th>Date</th><th>From</th><th>To</th><th>Time</th><th>Notes</th></tr></thead>\n<tbody>\n<tr><td>Inbound</td><td>Thursday 2 July</td><td>Home</td><td>Nice (NCE)</td><td>10:00 AM</td><td>Family of 4</td></tr>\n<tr><td>Mid-trip</td><td>Thursday 9 July</td><td>Nice (NCE)</td><td>Home</td><td>10:45 AM</td><td>Sons (19 & 17) return</td></tr>\n<tr><td>Outbound</td><td>Tuesday 28 July</td><td>Marseille (MRS)</td><td>Home</td><td>10:55 AM</td><td>2 adults</td></tr>\n</tbody></table>\n<hr>"}], "appendix_html": ""};
const panels = [
  { label: "Overview", name: "Trip", heading: "Trip Overview", html: TRIP.intro_html },
  ...TRIP.days,
  { label: "Appendix", name: "Notes", heading: "Appendix", html: TRIP.appendix_html }
];
let activeIndex = 0;
let saveTimer = null;

function escapeText(value) {
  const span = document.createElement("span");
  span.textContent = value || "";
  return span.innerHTML;
}

function notify(text) {
  savedNote.textContent = text;
  savedNote.classList.add("show");
  window.setTimeout(() => savedNote.classList.remove("show"), 1300);
}

function readEdits() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
  catch (_) { return {}; }
}

function writeEdits() {
  const edits = {};
  document.querySelectorAll(".editable-content").forEach((el) => {
    edits[el.dataset.panelId] = el.innerHTML;
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(edits));
  notify("Saved");
}

function scheduleSave() {
  window.clearTimeout(saveTimer);
  saveTimer = window.setTimeout(writeEdits, 500);
}

function switchPanel(index) {
  index = Math.max(0, Math.min(index, panels.length - 1));
  activeIndex = index;
  document.querySelectorAll(".day-tab").forEach((el, i) => el.classList.toggle("active", i === index));
  document.querySelectorAll(".panel").forEach((el, i) => el.classList.toggle("active", i === index));
  if (dayJump) dayJump.value = String(index);
  if (prevDayBtn) prevDayBtn.disabled = index === 0;
  if (nextDayBtn) nextDayBtn.disabled = index === panels.length - 1;
  const activeTab = document.querySelector(".day-tab.active");
  if (activeTab) activeTab.scrollIntoView({ block: "nearest", inline: "center", behavior: "smooth" });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function render() {
  document.getElementById("itin-title").textContent = TRIP.title;
  document.getElementById("itin-dates").textContent = TRIP.dates;
  const edits = readEdits();
  panels.forEach((panel, index) => {
    const option = document.createElement("option");
    option.value = String(index);
    option.textContent = `${panel.label} - ${panel.name || panel.heading || ""}`;
    dayJump.appendChild(option);

    const tab = document.createElement("button");
    tab.type = "button";
    tab.className = "day-tab" + (index === 0 ? " active" : "");
    tab.innerHTML = `<span class="day-tab-label">${escapeText(panel.label)}</span><span class="day-tab-name">${escapeText(panel.name)}</span>`;
    tab.addEventListener("click", () => switchPanel(index));
    tabs.appendChild(tab);

    const section = document.createElement("section");
    section.className = "panel" + (index === 0 ? " active" : "");
    section.innerHTML = `
      <div class="panel-shell">
        <div class="panel-heading">
          <div class="panel-kicker">${escapeText(panel.label)}</div>
          <h2 class="panel-title">${escapeText(panel.heading || panel.name)}</h2>
        </div>
        <article class="editable-content" data-panel-id="${index}" contenteditable="true" spellcheck="true">${edits[index] || panel.html || ""}</article>
      </div>`;
    section.querySelector(".editable-content").addEventListener("input", scheduleSave);
    body.appendChild(section);
  });
  switchPanel(0);
}

function exportHtml() {
  writeEdits();
  const clone = document.documentElement.cloneNode(true);
  clone.querySelectorAll(".editable-content").forEach((el, i) => {
    panels[i].html = el.innerHTML;
  });
  const blob = new Blob(["<!DOCTYPE html>\n" + clone.outerHTML], { type: "text/html" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "France_July_2026_Interactive_Itinerary_edited.html";
  link.click();
  URL.revokeObjectURL(link.href);
}

document.getElementById("save-btn").addEventListener("click", writeEdits);
document.getElementById("export-btn").addEventListener("click", exportHtml);
dayJump.addEventListener("change", () => switchPanel(Number(dayJump.value)));
prevDayBtn.addEventListener("click", () => switchPanel(activeIndex - 1));
nextDayBtn.addEventListener("click", () => switchPanel(activeIndex + 1));
document.getElementById("reset-btn").addEventListener("click", () => {
  if (!confirm("Reset browser edits for this itinerary?")) return;
  localStorage.removeItem(STORAGE_KEY);
  window.location.reload();
});
render();
</script>


</body></html>
