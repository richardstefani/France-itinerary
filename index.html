<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>France July 2026 - Itinerary</title>
<style>
:root {
  --ink: #1c1c2e;
  --ink-soft: #4a4a68;
  --ink-muted: #8b8aa1;
  --paper: #f8f7f2;
  --paper-warm: #efede4;
  --card: #ffffff;
  --accent: #c8782a;
  --accent-soft: #f4e8d8;
  --accent-dark: #9f5d20;
  --blue: #2a5f8a;
  --green: #3a7d5a;
  --border: #e4e0d8;
  --shadow: 0 2px 14px rgba(28,28,46,0.08);
  --shadow-md: 0 8px 30px rgba(28,28,46,0.13);
  --radius: 14px;
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.6;
}
#app { min-height: 100vh; display: flex; flex-direction: column; }
.itin-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: linear-gradient(180deg, #1c1c2e 0%, #25253a 100%);
  color: var(--paper);
  padding: max(24px, env(safe-area-inset-top)) 18px 0;
  box-shadow: 0 8px 28px rgba(28,28,46,0.18);
}
.header-inner { max-width: 1060px; margin: 0 auto; }
.itin-eyebrow {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--accent);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.itin-eyebrow::before { content: ""; width: 24px; height: 1px; background: var(--accent); opacity: 0.55; }
.title-row { display: flex; align-items: flex-end; gap: 16px; justify-content: space-between; margin-top: 8px; }
.itin-title {
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(28px, 5vw, 50px);
  font-weight: 400;
  line-height: 1.08;
  margin: 0;
}
.itin-dates { color: rgba(248,247,242,0.58); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; margin: 8px 0 18px; }
.toolbar { display: flex; gap: 8px; flex-shrink: 0; padding-bottom: 18px; }
.tool-btn {
  width: 38px;
  height: 38px;
  border: 1px solid rgba(248,247,242,0.18);
  color: var(--paper);
  background: rgba(255,255,255,0.06);
  border-radius: 999px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.tool-btn:hover { background: rgba(255,255,255,0.12); }
.day-controls {
  display: grid;
  grid-template-columns: 38px minmax(0, 1fr) 38px;
  gap: 8px;
  align-items: center;
  padding-bottom: 12px;
}
.nav-btn, .day-jump {
  height: 38px;
  border: 1px solid rgba(248,247,242,0.18);
  color: var(--paper);
  background: rgba(255,255,255,0.06);
  border-radius: 999px;
}
.nav-btn {
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.nav-btn:disabled {
  opacity: 0.28;
  cursor: default;
}
.day-jump {
  min-width: 0;
  padding: 0 36px 0 14px;
  font-size: 13px;
  color: var(--paper);
  appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, var(--paper) 50%),
    linear-gradient(135deg, var(--paper) 50%, transparent 50%);
  background-position:
    calc(100% - 18px) 16px,
    calc(100% - 12px) 16px;
  background-size: 6px 6px, 6px 6px;
  background-repeat: no-repeat;
}
.day-jump option { color: var(--ink); background: var(--paper); }
.day-tabs {
  display: flex;
  gap: 1px;
  overflow-x: auto;
  scrollbar-width: none;
  margin: 0 -18px;
  padding: 0 18px;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  border: 0;
  background: transparent;
  color: rgba(248,247,242,0.42);
  padding: 11px 15px 13px;
  cursor: pointer;
  white-space: nowrap;
  position: relative;
  min-width: 84px;
  text-align: center;
}
.day-tab::after {
  content: "";
  position: absolute;
  left: 10px;
  right: 10px;
  bottom: 0;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transition: transform 0.2s ease;
}
.day-tab.active::after { transform: scaleX(1); }
.day-tab.active { color: var(--paper); }
.day-tab-label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; color: var(--accent); }
.day-tab-name { display: block; max-width: 150px; overflow: hidden; text-overflow: ellipsis; font-family: Georgia, "Times New Roman", serif; font-size: 14px; margin-top: 2px; }
.itin-body { width: 100%; max-width: 1060px; margin: 0 auto; padding: 24px 16px 56px; }
.panel { display: none; animation: fadeUp 0.24s ease; }
.panel.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.panel-shell {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.panel-heading {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #ffffff 0%, #fbfaf6 100%);
}
.panel-kicker { color: var(--accent); font-size: 11px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; }
.panel-title { margin: 3px 0 0; font-family: Georgia, "Times New Roman", serif; font-size: clamp(22px, 4vw, 34px); line-height: 1.15; font-weight: 400; }
.editable-content {
  padding: 18px 20px 24px;
  outline: none;
}
.editable-content:focus { box-shadow: inset 0 0 0 2px var(--accent-soft); }
.editable-content h1, .editable-content h2, .editable-content h3 {
  font-family: Georgia, "Times New Roman", serif;
  font-weight: 400;
  line-height: 1.2;
  margin: 24px 0 10px;
}
.editable-content h1 { font-size: 30px; }
.editable-content h2 { font-size: 24px; padding-top: 8px; border-top: 1px solid var(--border); }
.editable-content h3 { font-size: 21px; color: var(--accent-dark); }
.editable-content h1:first-child, .editable-content h2:first-child, .editable-content h3:first-child { margin-top: 0; }
.editable-content p { margin: 10px 0; }
.editable-content ul, .editable-content ol { margin: 8px 0 14px 1.35rem; padding: 0; }
.editable-content li { margin: 4px 0; padding-left: 2px; }
.editable-content li::marker { color: var(--accent); }
.editable-content strong { color: var(--ink); font-weight: 750; }
.editable-content em { color: var(--ink-soft); }
.editable-content hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
.editable-content table { width: 100%; border-collapse: collapse; margin: 14px 0 20px; font-size: 14px; display: block; overflow-x: auto; }
.editable-content th, .editable-content td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; vertical-align: top; }
.editable-content th { background: var(--paper-warm); color: var(--ink); }
.saved-note { position: fixed; right: 16px; bottom: 16px; background: var(--ink); color: var(--paper); border-radius: 999px; padding: 9px 13px; font-size: 12px; opacity: 0; transform: translateY(8px); transition: all 0.2s ease; pointer-events: none; }
.saved-note.show { opacity: 1; transform: translateY(0); }
@media (min-width: 760px) {
  .itin-header { padding-left: 28px; padding-right: 28px; }
  .itin-body { padding: 30px 28px 70px; }
  .editable-content { padding: 24px 30px 32px; }
  .panel-heading { padding: 22px 30px; }
}
@media (max-width: 640px) {
  body { font-size: 15px; }
  .title-row { align-items: flex-start; }
  .toolbar { padding-top: 3px; }
  .tool-btn { width: 34px; height: 34px; }
  .day-tab { min-width: 76px; padding-left: 12px; padding-right: 12px; }
  .day-tab-name { max-width: 112px; font-size: 13px; }
  .itin-body { padding: 16px 10px 44px; }
  .panel-shell { border-radius: 10px; }
  .editable-content { padding: 15px 14px 20px; }
  .panel-heading { padding: 15px 14px; }
}
@media print {
  .itin-header { position: static; }
  .toolbar, .day-tabs { display: none; }
  .panel { display: block; page-break-after: always; }
  .itin-body { max-width: none; padding: 0; }
  .panel-shell { box-shadow: none; border: 0; }
}
</style>
</head>

    <div class="header-inner">
      <div class="itin-eyebrow">Journey</div>

<script>
const TRIP = {"title": "France July 2026 - Itinerary", "dates": "2 July - 28 July 2026", "intro_html": "<h1>France July 2026 - Itinerary</h1>\n<p><strong>Trip Overview:</strong></p>\n<ul>\n<li><strong>Travelers:</strong> Family of 4 (2 adults, 2 sons aged 19 &amp; 17)</li>\n<li><strong>Duration:</strong> 2 July – 28 July 2026 (27 nights total)</li>\n<li><strong>Inbound Flight:</strong> Nice Airport, Thursday 2 July @ 10:00 AM</li>\n<li><strong>Family Split:</strong> Sons depart Nice on Thursday 9 July @ 10:45 AM (Week 1 only)</li>\n<li><strong>Outbound Flight:</strong> Marseille, Tuesday 28 July @ 10:55 AM (2 adults)</li>\n</ul>\n<hr>\n<h2>PART 1: ANTIBES (2–9 JULY) – FAMILY RIVIERA WEEK</h2>\n<p><strong>Theme:</strong> Beach time, harbour charm, day trips, family bonding<br>\n<strong>Accommodation:</strong> Antibes (central location for Riviera access)<br>\n<strong>Transport Strategy:</strong> SNCF rail for day trips to Nice/Cannes/Monaco; walking/local bus in Antibes<br>\n<strong>Vibe:</strong> Balanced mix of structured activities, relaxation, and spontaneity perfect for family</p>\n<hr>", "days": [{"label": "Day 1", "name": "ARRIVAL & SETTLING IN", "heading": "DAY 1 – THURSDAY, 2 JULY: ARRIVAL & SETTLING IN", "html": "<h3>DAY 1 – THURSDAY, 2 JULY: ARRIVAL &amp; SETTLING IN</h3>\n<p><strong>Morning/Afternoon:</strong></p>\n<ul>\n<li><strong>10:00 AM</strong> – Arrive Nice Côte d&rsquo;Azur Airport</li>\n<li><strong>10:15–10:45 AM</strong> – Collect luggage, navigate airport</li>\n<li><strong>10:45–11:15 AM</strong> – Travel to Antibes<ul>\n<li><strong>Recommended:</strong> Train from Nice to Antibes (direct ~30 min, €12–15 per person, very easy)</li>\n<li>Trains run every 30 min; buy tickets at station or SNCF machines</li>\n<li>Alternative: Rental car if keeping for countryside days later (~45 min via A8)</li>\n</ul>\n</li>\n<li><strong>12:00 PM</strong> – Check in to accommodation in Antibes Old Town</li>\n<li><strong>12:30–1:30 PM</strong> – Lunch near harbour (casual, settle in)<ul>\n<li><em>Recommended:</em> <strong>La Boîte à Matelots</strong> (family-friendly, casual seafood, Rue Thubé)</li>\n<li><em>Alternative:</em> <strong>Restaurant du Port</strong> (simpler, direct harbour views)</li>\n<li><em>Splurge option:</em> <strong>Mickaël Féval</strong> (Michelin-starred, reserve ahead – save for later)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Afternoon:</strong></p>\n<ul>\n<li><strong>2:00–5:00 PM</strong> – Explore Antibes Old Town at leisure (unstructured time)<ul>\n<li>Wander narrow streets, spot Château Grimaldi (Picasso Museum – entry optional)</li>\n<li>Browse independent shops, galleries, local vibe</li>\n<li>Boys may enjoy climbing to ramparts for 360° Mediterranean views</li>\n<li>Stop for ice cream or café pause</li>\n</ul>\n</li>\n<li><strong>5:30 PM</strong> – Beach at <strong>Plage de la Gravette</strong> (closest to Old Town, family-friendly)<ul>\n<li>Shallow entry, sandy, good for evening swim, cafés nearby</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:00 PM</strong> – Return to accommodation, freshen up, rest</li>\n<li><strong>7:30 PM</strong> – Aperitif/Dinner<ul>\n<li><em>Recommended:</em> <strong>Le Vauban</strong> (casual, waterfront terrace, Mediterranean mezze-style plates – great for families)</li>\n<li><em>Alternative:</em> <strong>Café Poulailler</strong> (relaxed bistro, hearty Provençal)</li>\n<li><em>Casual:</em> <strong>Pizzeria La Mamma</strong> (fun, family energy, good kids menu)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Antibes</p>\n<p><strong>Notes:</strong> Jet lag will likely hit around 8 PM – early dinner works well. Keep Day 1 low-key.</p>\n<hr>"}, {"label": "Day 2", "name": "ANTIBES & CAP D'ANTIBES EXPLORATION", "heading": "DAY 2 – FRIDAY, 3 JULY: ANTIBES & CAP D'ANTIBES EXPLORATION", "html": "<h3>DAY 2 – FRIDAY, 3 JULY: ANTIBES &amp; CAP D&rsquo;ANTIBES EXPLORATION</h3>\n<p><strong>Theme:</strong> Local coastline, scenic walks, beaches</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00–9:00 AM</strong> – Breakfast at hotel or local café<ul>\n<li><em>Suggested spots:</em> Café on Rue Sade, <strong>Café de la Madeleine</strong> (pastries, coffee)</li>\n</ul>\n</li>\n<li><strong>9:15–9:30 AM</strong> – Walk from Old Town to Cap d&rsquo;Antibes (or take local bus #2)</li>\n<li><strong>9:45 AM–12:30 PM</strong> – Cap d&rsquo;Antibes Coastal Walk<ul>\n<li>Beautiful 2-hour loop starting near Plage de la Garoupe</li>\n<li>Path winds along cliffs, Mediterranean on one side, pine woods on other</li>\n<li>Multiple small coves perfect for swimming stops (bring swimwear)</li>\n<li>All fitness levels OK; moderate pace</li>\n<li>Finish at <strong>Plage de la Garoupe</strong> (family beach, clear water, café)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch at seaside café on Cap d&rsquo;Antibes<ul>\n<li><em>Recommended:</em> <strong>Restaurant du Cap</strong> (casual, sea views, fresh fish)</li>\n<li><em>Casual:</em> <strong>La Petite Maison</strong> or beachside café (picnic-style)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–6:00 PM</strong> – Extended beach time<ul>\n<li>Plage de la Gravette or <strong>Plage de Ponteil</strong> (both close to Old Town)</li>\n<li>Swimming, relaxing, ice cream, chat</li>\n<li>Optional: small boat rental (pedalos/kayaks available at Plage de la Gravette, €15–20/hour)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:30 PM</strong> – Return to Old Town, rest</li>\n<li><strong>7:30 PM</strong> – Casual dinner<ul>\n<li><em>Recommended:</em> <strong>Pizzeria La Mamma</strong> (fun vibe, family-friendly)</li>\n<li><em>Alternative:</em> <strong>Les Vins du Coin</strong> (wine bar with tapas, casual)</li>\n<li><em>Casual:</em> <strong>Soraya</strong> (simple Mediterranean, good for tired family)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Antibes</p>\n<p><strong>Notes:</strong> Good active day for boys – balances Day 1 lethargy. Swimming stops on coastal walk are highlight.</p>\n<hr>"}, {"label": "Day 3", "name": "NICE DAY TRIP", "heading": "DAY 3 – SATURDAY, 4 JULY: NICE DAY TRIP", "html": "<h3>DAY 3 – SATURDAY, 4 JULY: NICE DAY TRIP</h3>\n<p><strong>Theme:</strong> Cosmopolitan Riviera, urban energy, beaches, old town charm</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00 AM</strong> – Breakfast in Antibes</li>\n<li><strong>8:30 AM</strong> – Train from Antibes to Nice (direct ~25 min, €12–15)<ul>\n<li>Trains every 20–30 min; journey scenic along coast</li>\n</ul>\n</li>\n<li><strong>9:15 AM–12:30 PM</strong> – Vieux Nice &amp; Promenade des Anglais<ul>\n<li>Explore narrow streets, colourful buildings (laundry fluttering overhead)</li>\n<li>Local markets (Cours Saleya – flowers, produce, crafts)</li>\n<li>Street performers, artists, vibrant atmosphere</li>\n<li>Boys will enjoy urban energy and street food stands</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch in Vieux Nice<ul>\n<li><em>Recommended:</em> <strong>Salière</strong> (authentic Niçoise cuisine, cosy)</li>\n<li><em>Alternative:</em> <strong>La Maison de Marie</strong> (rustic, hearty Provençal)</li>\n<li><em>Casual:</em> <strong>Café du Palais</strong> (simple, people-watching, good for groups)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Promenade des Anglais &amp; Beach<ul>\n<li>Leisurely 1-hour walk along famous beachfront promenade</li>\n<li>Stop at cafés, people-watch, take photos</li>\n<li>Beach time at <strong>Plage de Nice</strong> or <strong>Plage Magnan</strong> (pebble, clear water)</li>\n<li>Ice cream stop (gelateria on Promenade)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>5:45 PM</strong> – Train back to Antibes (~25 min)</li>\n<li><strong>7:00 PM</strong> – Rest, freshen up</li>\n<li><strong>7:30 PM</strong> – Dinner in Antibes<ul>\n<li><em>Recommended:</em> <strong>Le Comptoir</strong> (casual bistro, reliable)</li>\n<li><em>Alternative:</em> <strong>Café Poulailler</strong> (relaxed, lively atmosphere)</li>\n<li><em>Simple:</em> <strong>Soraya</strong> (unfussy Mediterranean)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Antibes</p>\n<p><strong>Notes:</strong> Nice is busiest town – go early to avoid crowds. Vieux Nice can feel touristy but authentic underneath. Boys may prefer Promenade energy to quiet beaches.</p>\n<hr>"}, {"label": "Day 4", "name": "CANNES DAY TRIP", "heading": "DAY 4 – SUNDAY, 5 JULY: CANNES DAY TRIP", "html": "<h3>DAY 4 – SUNDAY, 5 JULY: CANNES DAY TRIP</h3>\n<p><strong>Theme:</strong> Glamorous coastal town, film festival heritage, beaches, Riviera glamour</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00 AM</strong> – Breakfast in Antibes</li>\n<li><strong>8:30 AM</strong> – Train from Antibes to Cannes (direct ~15 min, €5–7)</li>\n<li><strong>9:15 AM–12:30 PM</strong> – Cannes Seafront &amp; Old Town<ul>\n<li>Walk the iconic <strong>Croisette Boulevard</strong> (famous boulevard with designer shops)</li>\n<li><strong>Palais des Festivals</strong> photo stop (where film festival happens)</li>\n<li>Explore <strong>Vieux Cannes</strong> (narrow streets behind waterfront, château, galleries)</li>\n<li>People-watch, soak in glamour/buzz</li>\n<li>Boys may enjoy spotting yachts and architecture</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch on Croisette or in Vieux Cannes<ul>\n<li><em>Recommended:</em> <strong>Le Squaw</strong> (casual, sea views, good for families)</li>\n<li><em>Alternative:</em> <strong>Gastromimétis</strong> (upscale casual, fresh Mediterranean)</li>\n<li><em>Budget:</em> Café on Croisette (picnic-style, watch boats)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Beach time<ul>\n<li><strong>Plage du Midi</strong> or <strong>Plage de la Bocca</strong> (both pleasant, calm)</li>\n<li>Relax, swim, read</li>\n<li>Cannes beaches less crowded than Nice</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Train back to Antibes (~15 min)</li>\n<li><strong>7:00 PM</strong> – Rest, freshen up</li>\n<li><strong>7:30 PM</strong> – Dinner in Antibes or Cannes (if staying later)<ul>\n<li><em>Recommended (Antibes):</em> <strong>Chez Fred</strong> (casual seafood)</li>\n<li><em>In Cannes:</em> <strong>Comptoir Méditerranée</strong> (Mediterranean small plates)</li>\n<li><em>Simple:</em> <strong>Café Poulailler</strong> (always reliable)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Antibes</p>\n<p><strong>Notes:</strong> Cannes is busier than Antibes but worth a day trip. Less charming than Antibes, more &ldquo;resort-y&rdquo; – balance with quieter days.</p>\n<hr>"}, {"label": "Day 5", "name": "ANTIBES LEISURELY DAY", "heading": "DAY 5 – MONDAY, 6 JULY: ANTIBES LEISURELY DAY", "html": "<h3>DAY 5 – MONDAY, 6 JULY: ANTIBES LEISURELY DAY</h3>\n<p><strong>Theme:</strong> Relaxation, culture, unstructured exploration</p>\n<p><strong>Note:</strong> Choosing <strong>Option A</strong> (relaxation) is recommended for family balance at this point. Save Monaco for another trip (it&rsquo;s a long day and expensive).</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Sleep in; leisurely breakfast at hotel or café</li>\n<li><strong>10:00–11:00 AM</strong> – Free choice activity<ul>\n<li>Swim at favourite beach (<strong>Plage de la Gravette</strong>)</li>\n<li>Browse shops/galleries in Old Town</li>\n<li>Sit at café with book/newspaper</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Morning:</strong></p>\n<ul>\n<li><strong>11:00 AM–1:00 PM</strong> – <strong>Musée Picasso</strong> (Château Grimaldi) or harbour wander<ul>\n<li>Picasso Museum: impressive collection, harbourfront location, worth 1–1.5 hours</li>\n<li>Or simply stroll harbour, watch fishermen, browse galleries</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch (casual)<ul>\n<li><em>Recommended:</em> <strong>Tête de Lard</strong> (casual, fun, hearty)</li>\n<li><em>Alternative:</em> <strong>L&rsquo;Arome</strong> (Provençal specialities, intimate)</li>\n<li><em>Seaside:</em> <strong>Le Vauban</strong> (waterfront, relaxed)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–6:00 PM</strong> – Beach time or shopping<ul>\n<li>Plage de la Gravette or Plage de Ponteil</li>\n<li>Ice cream, shopping in Old Town galleries/boutiques</li>\n<li>Aperitif at harbour café with water views</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening – SPECIAL DINNER:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Upgrade dinner (book ahead)<ul>\n<li><em>Highly Recommended:</em> <strong>Mickaël Féval</strong> (Michelin-starred seafood, exceptional, €70–100pp)</li>\n<li><em>Alternative:</em> <strong>Le Safari</strong> (upscale casual, good for groups)</li>\n<li><em>Provençal:</em> <strong>L&rsquo;Arome</strong> (intimate, regional specialities)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Antibes</p>\n<p><strong>Notes:</strong> Mickaël Féval is worth the splurge – book 2–3 days ahead. This day resets before busy week ahead. Boys will appreciate beach time + optional cultural activity.</p>\n<hr>"}, {"label": "Day 6", "name": "MARKET DAY & LOCAL LIVING", "heading": "DAY 6 – TUESDAY, 7 JULY: MARKET DAY & LOCAL LIVING", "html": "<h3>DAY 6 – TUESDAY, 7 JULY: MARKET DAY &amp; LOCAL LIVING</h3>\n<p><strong>Theme:</strong> Provençal market culture, local rhythm, beach time</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00 AM</strong> – Walk to <strong>Marché Provençal</strong> (Antibes farmers market)<ul>\n<li>Daily market; Tuesday is busy and lively</li>\n<li>Flowers, produce, crafts, local energy</li>\n<li>Browse, take photos, chat with vendors</li>\n<li>Perfect opportunity to pick up picnic supplies</li>\n</ul>\n</li>\n<li><strong>9:30–11:00 AM</strong> – Breakfast café stop<ul>\n<li><em>Suggested:</em> Café near market on <strong>Cours Masséna</strong>, or café in Old Town</li>\n<li>Soak in atmosphere, people-watch</li>\n</ul>\n</li>\n</ul>\n<p><strong>Midday:</strong></p>\n<ul>\n<li><strong>11:30 AM–1:00 PM</strong> – Harbour-side lunch<ul>\n<li><em>Recommended:</em> <strong>Le Vauban</strong> (casual, waterfront, great for groups)</li>\n<li><em>Alternative:</em> Beachside café at <strong>Plage de la Gravette</strong></li>\n<li><em>Picnic option:</em> Use market purchases for beach picnic</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>2:00–5:00 PM</strong> – Extended beach time<ul>\n<li>Swimming, relaxing, ice cream</li>\n<li>Optional: small boat rental (pedalos, kayaks, €15–20/hour) or stand-up paddleboard</li>\n<li>Boys might enjoy water sports option</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Stroll Old Town<ul>\n<li>Browse galleries, shops, soak in evening light</li>\n<li>Aperitif at harbour café</li>\n</ul>\n</li>\n<li><strong>7:30 PM</strong> – Dinner<ul>\n<li><em>Recommended:</em> <strong>Le Bacon</strong> (upscale seafood, excellent, book ahead)</li>\n<li><em>Alternative:</em> <strong>Café Poulailler</strong> (casual, lively)</li>\n<li><em>Simple:</em> <strong>Pizzeria La Mamma</strong> (fun, relaxed)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Antibes</p>\n<p><strong>Notes:</strong> Market day captures authentic Provençal life. Great for boys to see local culture. Combines culture + beach time well.</p>\n<hr>"}, {"label": "Day 7", "name": "REST & FLEXIBILITY", "heading": "DAY 7 – WEDNESDAY, 8 JULY: REST & FLEXIBILITY", "html": "<h3>DAY 7 – WEDNESDAY, 8 JULY: REST &amp; FLEXIBILITY</h3>\n<p><strong>Theme:</strong> Spontaneous, unstructured day; recharge before boys depart</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Sleep in</li>\n<li><strong>9:30–12:00 PM</strong> – Activity of choice<ul>\n<li>Beach time (favourite spot)</li>\n<li>Shops/ice cream in Old Town</li>\n<li>Sit in café with coffee, relax</li>\n<li>Optional: revisit favourite museum or site</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>12:30–1:30 PM</strong> – Lunch (location of choice)<ul>\n<li><em>Casual:</em> <strong>Salade d&rsquo;Asperges</strong> (light, fresh)</li>\n<li><em>Relaxed:</em> <strong>Gaston &amp; Gastronome</strong> (friendly bistro)</li>\n<li><em>Simple:</em> <strong>Café</strong> in Old Town</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>2:00–5:00 PM</strong> – Final beach or Old Town time<ul>\n<li>Favourite beach, swim, read, chat</li>\n<li>Soak in Mediterranean calm</li>\n<li>Take family photos</li>\n<li>No agenda – whatever family wants</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening – FAMILY FAREWELL DINNER:</strong></p>\n<ul>\n<li><strong>7:00 PM</strong> – Special dinner (book ahead – this is important)<ul>\n<li><em>Highly Recommended:</em> <strong>Mickaël Féval</strong> (Michelin; exceptional, €70–100pp) OR</li>\n<li><em>Alternative:</em> <strong>Le Safari</strong> (upscale casual, good for groups, €50–70pp)</li>\n<li><em>Provençal:</em> <strong>L&rsquo;Arome</strong> (intimate, regional, €45–60pp)</li>\n<li><strong>Why special?</strong> This is the final family meal before boys depart tomorrow</li>\n<li>Make this meaningful – toast, take photos, reflect on week</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Antibes</p>\n<p><strong>Notes:</strong> Keep Day 7 truly open for family connection. The farewell dinner should feel special &amp; unhurried. Boys will remember this.</p>\n<hr>"}, {"label": "Day 8", "name": "BOYS' DEPARTURE & ADULT TRANSITION", "heading": "DAY 8 – THURSDAY, 9 JULY: BOYS' DEPARTURE & ADULT TRANSITION", "html": "<h3>DAY 8 – THURSDAY, 9 JULY: BOYS&rsquo; DEPARTURE &amp; ADULT TRANSITION</h3>\n<p><strong>Theme:</strong> Goodbye &amp; pivot to couple&rsquo;s trip</p>\n<p><strong>Very Early Morning:</strong></p>\n<ul>\n<li><strong>5:30 AM</strong> – Wake up, breakfast, final packing</li>\n<li><strong>6:00 AM</strong> – Check out of Antibes accommodation (or arrange luggage storage if transferring later)</li>\n<li><strong>6:15–6:45 AM</strong> – Travel to Nice Airport<ul>\n<li><strong>Via Train (Recommended):</strong> Antibes→Nice (~25 min), then bus/taxi to airport (~15 min)</li>\n<li>Train departs ~6:45 AM from Antibes station</li>\n<li>Taxi/bus from Nice station to airport ~€15–20</li>\n<li><strong>Via Car Rental (if keeping vehicle):</strong> Direct drive ~45 min</li>\n<li><strong>Arrive airport:</strong> 7:30–7:45 AM (2 hours before 10:45 AM flight)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>7:45–8:15 AM</strong> – Check in, security, boarding</li>\n<li><strong>10:45 AM</strong> – Boys&rsquo; flight departs Nice for home<ul>\n<li>Emotional goodbye; allow time for this</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Morning (Parents only) – TRANSITION:</strong></p>\n<ul>\n<li>\n<p><strong>11:00 AM–12:15 PM</strong> – Travel from Antibes to Aix-en-Provence</p>\n<ul>\n<li><strong>Recommended route:</strong> </li>\n<li>If keeping rental car: Drive Antibes→Aix (~2.5 hours via A8→A7)</li>\n<li>If returning car at Nice: Antibes→Nice train, drop car, new train Antibes→Marseille→Aix</li>\n<li><strong>Simplest:</strong> Return car at Antibes station if renting from there; take train directly Antibes→Marseille→Aix (total ~3 hours with connection)</li>\n<li><strong>Cost:</strong> €40–60 per person by train</li>\n</ul>\n</li>\n<li>\n<p><strong>2:00–3:00 PM</strong> – Arrive Aix-en-Provence, check into accommodation</p>\n<ul>\n<li><em>Recommended area:</em> Near <strong>Cours Mirabeau</strong> or <strong>Old Town</strong> (walkable, café culture)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon (Pivoting to Couple&rsquo;s Mode):</strong></p>\n<ul>\n<li><strong>3:30–5:00 PM</strong> – First solo exploration of Aix<ul>\n<li>Wander around Cathedral, Rue Gaston de Saporta</li>\n<li>Sit at café on <strong>Cours Mirabeau</strong> (famous tree-lined boulevard)</li>\n<li>Browse shops, galleries, markets (Marché Aux Fleurs if open)</li>\n<li>Take moment to transition from family mode to couple mode</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening – WELCOME TO AIX DINNER:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Special dinner (book ahead)<ul>\n<li><em>Recommended:</em> <strong>Fabrice Donnée</strong> (Michelin-starred, sophisticated, €80–120pp) OR</li>\n<li><em>Alternative:</em> <strong>Le Jasmin</strong> (Provençal, warm, €50–70pp)</li>\n<li><em>Casual:</em> <strong>Mickaël Féval</strong> if Aix location exists (excellent seafood)</li>\n<li>Celebrate transition to couple time</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<p><strong>Notes:</strong> Day 8 is emotional &amp; logistical. Build in buffer time for airport goodbyes. Evening dinner in Aix marks shift to 19 days of couple exploration. Bittersweet but exciting.</p>\n<hr>\n<h2>PART 2: AIX-EN-PROVENCE (9–19 JULY) – URBAN PROVENCE &amp; COUPLE&rsquo;S TIME</h2>\n<p><strong>Theme:</strong> Café culture, markets, day trips to Avignon/Arles/Marseille, wine country exploration<br>\n<strong>Accommodation:</strong> Central Aix (near Cours Mirabeau or Old Town)<br>\n<strong>Transport Strategy:</strong> SNCF for day trips; walking locally; consider car hire for countryside<br>\n<strong>Vibe:</strong> Sophisticated, slower-paced, focused on food, wine, art, regional culture</p>\n<hr>"}, {"label": "Day 9", "name": "AIX-EN-PROVENCE INTRODUCTION & MARKETS", "heading": "DAY 9 – FRIDAY, 10 JULY: AIX-EN-PROVENCE INTRODUCTION & MARKETS", "html": "<h3>DAY 9 – FRIDAY, 10 JULY: AIX-EN-PROVENCE INTRODUCTION &amp; MARKETS</h3>\n<p><strong>Theme:</strong> Markets, café culture, Cézanne atmosphere, local living</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00 AM</strong> – <strong>Marché Aux Fleurs</strong> (flower market, daily except Monday)<ul>\n<li>Colourful, fragrant, quintessential Provence</li>\n<li>Browse flowers, local produce</li>\n<li>Take photos</li>\n</ul>\n</li>\n<li><strong>8:30–9:30 AM</strong> – Breakfast at historic café<ul>\n<li><em>Highly Recommended:</em> <strong>Les Deux Garçons</strong> (iconic 1792 café, elegant, institution)</li>\n<li><em>Alternative:</em> <strong>Café de la Madeleine</strong> (pastries, coffee, charming)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Morning:</strong></p>\n<ul>\n<li><strong>10:00 AM–12:30 PM</strong> – Aix Old Town exploration<ul>\n<li><strong>Cathedral (Cathédrale Sainte-Sauveur):</strong> ornate, beautiful interiors</li>\n<li><strong>Rue Gaston de Saporta:</strong> charming old street with galleries</li>\n<li>Browse art galleries, antique shops</li>\n<li><strong>Musée Granet:</strong> art museum with Cézanne works (worth 1–1.5 hours if interested)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Market-fresh lunch<ul>\n<li><em>Highly Recommended:</em> <strong>Pierre Reboul</strong> (Michelin-starred, €80–120pp, book ahead)</li>\n<li><em>Alternative:</em> <strong>Manon les Suds</strong> (market-fresh, casual-upscale, €50–70pp)</li>\n<li><em>Casual:</em> <strong>Le Jasmin</strong> (Provençal, warm, €35–50pp)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – <strong>Musée Granet</strong> or leisure stroll<ul>\n<li>Granet: excellent art collection, Cézanne, modern art (if art lovers)</li>\n<li>Or: Sit at café on <strong>Cours Mirabeau</strong> with book, people-watch, slow pace</li>\n<li>Browse galleries, boutiques</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Rest at accommodation</li>\n<li><strong>6:30 PM</strong> – Aperitif at Cours Mirabeau café<ul>\n<li>Sit under plane trees, watch evening light, sip pastis/wine</li>\n<li>Classic Provence moment</li>\n</ul>\n</li>\n<li><strong>7:30 PM</strong> – Dinner (upscale casual)<ul>\n<li><em>Recommended:</em> <strong>Caruso</strong> (Italian fine dining, excellent, €60–80pp)</li>\n<li><em>Alternative:</em> <strong>Edouard Loubet</strong> (Michelin, modern, €80–100pp)</li>\n<li><em>Classic:</em> <strong>Le Jasmin</strong> (Provençal comfort, €50–70pp)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<p><strong>Notes:</strong> Day 9 introduces Aix&rsquo;s rhythm – markets, cafés, culture. Slow pace. Couples can finally relax &amp; reconnect. Marché Aux Fleurs is highlight.</p>\n<hr>"}, {"label": "Day 10", "name": "AVIGNON DAY TRIP", "heading": "DAY 10 – SATURDAY, 11 JULY: AVIGNON DAY TRIP", "html": "<h3>DAY 10 – SATURDAY, 11 JULY: AVIGNON DAY TRIP</h3>\n<p><strong>Theme:</strong> Papal palace, medieval walls, UNESCO history, Rhône culture</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>7:45 AM</strong> – Breakfast in Aix or light café stop</li>\n<li><strong>8:15 AM</strong> – Train from Aix to Avignon (direct ~35 min, €15–20)<ul>\n<li>Beautiful countryside views during journey</li>\n</ul>\n</li>\n<li><strong>9:00 AM–1:00 PM</strong> – Avignon exploration<ul>\n<li><strong>Palais des Papes</strong> (UNESCO; massive Gothic fortress, incredible)</li>\n<li>Book tickets ahead (€15/person), allow 1.5–2 hours inside</li>\n<li>Audio guide included, fascinating history of papal court</li>\n<li><strong>Pont d&rsquo;Avignon</strong> (famous bridge, iconic, photos)</li>\n<li><strong>Old Town walls &amp; streets:</strong> charming, medieval, galleries</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Avignon lunch<ul>\n<li><em>Recommended:</em> <strong>La Mirande</strong> (upscale Provençal, elegant, €70–100pp, book ahead)</li>\n<li><em>Alternative:</em> <strong>Numero 75</strong> (casual-upscale, fresh Mediterranean, €50–70pp)</li>\n<li><em>Casual:</em> Riverside café along Rhône</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Optional second activity or leisure<ul>\n<li><strong>Musée du Petit Palais</strong> (art museum, worth 1 hour)</li>\n<li>Or: Sit at café along Rhône, relax</li>\n<li>Or: Walk along Rhône promenade, take photos</li>\n<li>No pressure – couple&rsquo;s pace</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>5:45 PM</strong> – Train back to Aix (~35 min)</li>\n<li><strong>7:00 PM</strong> – Rest, freshen up</li>\n<li><strong>7:30 PM</strong> – Casual dinner in Aix<ul>\n<li><em>Recommended:</em> <strong>Le Jasmin</strong> (Provençal, warm, reliable, €50–70pp)</li>\n<li><em>Casual:</em> <strong>Café Rouge</strong> or other relaxed spot</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<p><strong>Notes:</strong> Avignon&rsquo;s Palais des Papes is stunning – book tickets ahead. Day trip is manageable; Aix–Avignon train is scenic. Save energy for wine country ahead.</p>\n<hr>"}, {"label": "Day 11", "name": "ALPS DAY TRIP (OR ARLES ALTERNATIVE)", "heading": "DAY 11 – SUNDAY, 12 JULY: ALPS DAY TRIP (OR ARLES ALTERNATIVE)", "html": "<h3>DAY 11 – SUNDAY, 12 JULY: ALPS DAY TRIP (OR ARLES ALTERNATIVE)</h3>\n<p><strong>Theme:</strong> Alpine scenery, mountain landscape, dramatic elevation change from Mediterranean</p>\n<p><strong>Note:</strong> Alps from Aix is doable as day trip, but on outer edge of feasibility (4–5 hours driving round-trip). Alpine experience is worth it for those who love mountains.</p>\n<hr>\n<p><strong>OPTION A – ALPS DAY TRIP (Recommended for mountain lovers):</strong></p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>7:00 AM</strong> – Breakfast in Aix (early start needed)</li>\n<li><strong>7:45 AM</strong> – Car hire pickup (if not already rented from Day 14)<ul>\n<li>Arrange rental night before to save time</li>\n</ul>\n</li>\n<li><strong>8:00 AM–12:00 PM</strong> – Drive to <strong>Durance Valley &amp; Southern Alps</strong><ul>\n<li><strong>Route:</strong> Aix → Durance River Valley → Montagne Sainte-Victoire foothills → Alpine foothills</li>\n<li><strong>Destination:</strong> <strong>Lac de Sainte-Croix</strong> area OR <strong>Verdon Gorge</strong> lower sections (2–2.5 hours)</li>\n<li>Alternatively: <strong>Mercantour National Park</strong> foothills (3 hours, more remote)</li>\n<li>Dramatic scenery: transition from Provence hills to alpine landscape</li>\n<li>Wildflower meadows (July), pine forests, mountain vistas</li>\n<li><strong>Note:</strong> Not true high Alps (snow line is higher), but stunning alpine foothills</li>\n</ul>\n</li>\n</ul>\n<p><strong>Suggested Alpine Stop:</strong>\n    - <strong>Lac de Sainte-Croix</strong> (turquoise glacial lake, dramatic setting, 1–1.5 hours from Aix)\n    - Walk around lake shore, photograph scenery\n    - Stop at café overlooking water\n    - OR <strong>Verdon Gorge lower sections</strong> (dramatic canyon, scenic drives, hiking options)\n    - European&rsquo;s &ldquo;Grand Canyon,&rdquo; stunning geology\n    - Short walks available (30 min–1 hour)</p>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:00 PM</strong> – Lunch at Alpine location<ul>\n<li><em>Suggested:</em> Café at Lac de Sainte-Croix or village café</li>\n<li><em>Picnic:</em> Market provisions with mountain views</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>2:00–4:00 PM</strong> – Alpine exploration<ul>\n<li>Walk around lake or short hike in area</li>\n<li>Photography, scenery immersion</li>\n<li>Experience altitude/mountain air</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Afternoon:</strong></p>\n<ul>\n<li><strong>4:15 PM</strong> – Drive back to Aix (2–2.5 hours)</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:30 PM</strong> – Return to Aix, rest, freshen up</li>\n<li><strong>7:30 PM</strong> – Casual dinner<ul>\n<li><em>Suggested:</em> <strong>Le Jasmin</strong> or local bistro</li>\n<li>Light meal after long driving day</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<p><strong>Notes:</strong></p>\n<ul>\n<li><strong>Feasibility:</strong> Yes, day trip is doable but tiring (5+ hours driving total)</li>\n<li><strong>Best for:</strong> Mountain lovers, those wanting dramatic scenery change</li>\n<li><strong>Weather:</strong> Check forecast (July in foothills can be hot but pleasant)</li>\n<li><strong>Pacing:</strong> After arrival tiredness, this is active day – consider energy levels</li>\n<li><strong>Worth it?</strong> If you love mountains/dramatic scenery, YES. If prefer relaxed pace, skip for Arles option</li>\n</ul>\n<hr>\n<p><strong>OPTION B – ARLES DAY TRIP (Alternative if Alps feels too ambitious):</strong></p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>7:45 AM</strong> – Breakfast in Aix</li>\n<li><strong>8:15 AM</strong> – Train from Aix to Arles (~50 min, €15–20)</li>\n<li><strong>9:15 AM–1:00 PM</strong> – Arles exploration<ul>\n<li><strong>Place du Forum &amp; Café de la Nuit</strong> (Van Gogh&rsquo;s Starry Night café)</li>\n<li>Sit for coffee/aperitif, soak in atmosphere</li>\n<li><strong>Roman Theatre &amp; Amphitheatre (Les Arènes):</strong> impressive Roman ruins</li>\n<li><strong>Musée de l&rsquo;Arles Antique</strong> (Roman archaeology, excellent museum, worth 1.5 hours)</li>\n<li><strong>Narrow streets &amp; artist vibe:</strong> galleries, shops, wandering</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Arles lunch<ul>\n<li><em>Recommended:</em> <strong>La Maison du Boeuf</strong> (Camargue beef, regional speciality, €50–70pp)</li>\n<li><em>Alternative:</em> <strong>L&rsquo;Arlésienne</strong> (Provençal, traditional, €40–60pp)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Musée de l&rsquo;Arles et de la Provence or leisure<ul>\n<li>Local history museum (worth 1 hour if interested)</li>\n<li>Or: Wander towards Rhône riverside, sit at café, read</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>5:45 PM</strong> – Train back to Aix (~50 min)</li>\n<li><strong>7:00 PM</strong> – Rest, freshen up</li>\n<li><strong>7:30 PM</strong> – Dinner in Aix<ul>\n<li><em>Suggested:</em> <strong>Caruso</strong> or <strong>Le Jasmin</strong></li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<p><strong>Notes:</strong> Arles is smaller, more charming than Avignon. Van Gogh connection is strong. Easier/less tiring than Alps option.</p>\n<hr>\n<p><strong>RECOMMENDED:</strong> If you love mountains + have energy → <strong>OPTION A (Alps)</strong> | If prefer easier pace → <strong>OPTION B (Arles)</strong></p>\n<hr>"}, {"label": "Day 12", "name": "LAVENDER FIELDS & PROVENÇAL COUNTRYSIDE (BASTILLE DAY EVE)", "heading": "DAY 12 – MONDAY, 13 JULY: LAVENDER FIELDS & PROVENÇAL COUNTRYSIDE (BASTILLE DAY EVE)", "html": "<h3>DAY 12 – MONDAY, 13 JULY: LAVENDER FIELDS &amp; PROVENÇAL COUNTRYSIDE (BASTILLE DAY EVE)</h3>\n<p><strong>Theme:</strong> Iconic Provençal purple fields, regional landscape, sensory experience, Bastille Day atmosphere</p>\n<p><strong>Note:</strong> Mid-July lavender is past peak bloom (peak is late June–early July), but fields still beautiful &amp; fragrant. If appearance/density matters most, this is realistic expectation. Landscape itself is stunning.</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>7:45 AM</strong> – Breakfast in Aix</li>\n<li><strong>8:45 AM</strong> – Car hire pickup (or pick up from Day 14 rental)<ul>\n<li>If not already rented, arrange car for this day + Days 14–17</li>\n</ul>\n</li>\n<li><strong>9:00 AM–1:00 PM</strong> – Drive to <strong>Lavender Country</strong> (Provence Lavande Region)<ul>\n<li><strong>Route:</strong> Aix → Valensole Plateau (~1 hour drive northeast via D8)</li>\n<li><strong>Valensole</strong> is heart of lavender country – iconic purple fields cover landscape in summer</li>\n<li>Mid-July: fields past absolute peak (June peak), but still aromatic &amp; visually impressive</li>\n<li>Stop at scenic overlooks, take photographs</li>\n<li>Walk through fields if accessible (check property access – some are private)</li>\n<li>Visit local producer for lavender products (soap, honey, essential oils)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Suggested Stops:</strong>\n    - <strong>Valensole village</strong> (charming, central, cafés)\n    - <strong>Distillerie &ldquo;Florale et Aromatique&rdquo;</strong> (working distillery, watch production, shop lavender goods)\n    - <strong>Musée de la Lavande</strong> (if interested in history, €7 entry)\n    - Scenic overlooks on plateau (free, spectacular views)</p>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch in Valensole<ul>\n<li><em>Suggested:</em> Local café in village (simple, authentic)</li>\n<li><em>Picnic option:</em> Market provisions from Aix with Valensole views</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:00 PM</strong> – Extended lavender exploration<ul>\n<li>Continue drive through lavender plateau</li>\n<li>Visit second distillery or producer</li>\n<li>Browse village shops (lavender soaps, honey, sachets – good souvenirs)</li>\n<li>Photography, walk fields, soak in landscape</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Afternoon:</strong></p>\n<ul>\n<li><strong>5:00 PM</strong> – Drive back to Aix (~1 hour)</li>\n</ul>\n<p><strong>Evening – BASTILLE DAY CELEBRATION:</strong></p>\n<ul>\n<li><strong>6:30 PM</strong> – Rest, freshen up</li>\n<li><strong>7:00 PM</strong> – Aperitif at Cours Mirabeau café<ul>\n<li>Watch Bastille Day preparations (flags, decorations, street activity)</li>\n<li>Sip pastis, feel French summer</li>\n</ul>\n</li>\n<li><strong>8:00 PM</strong> – <strong>MICHELIN DINNER: Pierre Reboul (1 Michelin star, Aix-en-Provence)</strong><ul>\n<li>⭐ <strong>Imaginative French cuisine, modern sensibility, authentic Provençal focus</strong></li>\n<li>Menu redesigned every 6 weeks with matched wines</li>\n<li>&ldquo;Funky&rdquo; refined atmosphere – elegant but not stuffy</li>\n<li>€80–120pp, book well in advance</li>\n<li><strong>Why Pierre Reboul?</strong> Best Michelin experience in Aix for sophisticated Provence cuisine; represents modern take on regional food; tasting menu perfect for couple&rsquo;s celebratory dinner; less formal/more engaging than typical haute cuisine</li>\n<li><strong>Alternative if fully booked:</strong> <strong>Château de la Gaude</strong> (1 Michelin star, ~10 min from Aix centre, more formal, Japanese-Provençal fusion by Chef Matthieu Dupuis-Baumal, €100–130pp)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<p><strong>Notes:</strong> Lavender fields are iconic Provence experience – worth the drive even past peak bloom. Valensole plateau is breathtaking. Distillery visit adds sensory dimension. Bastille Day atmosphere in Aix is festive. <strong>Pierre Reboul is your single Michelin splurge</strong> – it&rsquo;s an excellent gastronomic experience in Aix, with sophisticated Provence cuisine and modern sensibility (exactly what you wanted – regional + fine dining + accessible elegance).</p>\n<hr>"}, {"label": "Day 13", "name": "AIX REST & SLOW DAY (BASTILLE DAY)", "heading": "DAY 13 – TUESDAY, 14 JULY: AIX REST & SLOW DAY (BASTILLE DAY)", "html": "<h3>DAY 13 – TUESDAY, 14 JULY: AIX REST &amp; SLOW DAY (BASTILLE DAY)</h3>\n<p><strong>Theme:</strong> Bastille Day local celebration, café culture, personal time, recharge</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:30 AM</strong> – Sleep in</li>\n<li><strong>9:00–9:30 AM</strong> – Leisurely café breakfast<ul>\n<li><em>Suggested:</em> <strong>Les Deux Garçons</strong> or local café on Cours Mirabeau</li>\n</ul>\n</li>\n<li><strong>10:00 AM–12:00 PM</strong> – Free choice morning<ul>\n<li>Revisit favourite Aix spot (Musée Granet, Cathedral, galleries, shops)</li>\n<li>Sit at café, people-watch</li>\n<li>Slow pace – no agenda</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>12:30–2:00 PM</strong> – Lunch (your choice)<ul>\n<li><em>Recommended:</em> <strong>Manon les Suds</strong> (market-fresh, casual, €40–60pp)</li>\n<li><em>Upscale:</em> <strong>Pierre Reboul</strong> (Michelin, €80–120pp, book ahead)</li>\n<li><em>Casual:</em> <strong>Le Jasmin</strong> or café</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>2:30–5:30 PM</strong> – Unstructured time<ul>\n<li>Nap, read, rest</li>\n<li>Spa/wellness if available</li>\n<li>Shop, walk</li>\n<li>Prepare for wine country days ahead</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening – BASTILLE DAY CELEBRATION:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Freshen up, prepare for evening</li>\n<li><strong>7:00 PM</strong> – Aperitif at Cours Mirabeau café<ul>\n<li>Watch Bastille Day preparations (flags, decorations, street activity)</li>\n<li>Sip pastis, feel French summer</li>\n</ul>\n</li>\n<li><strong>8:00 PM</strong> – Special Bastille Day dinner (book ahead)<ul>\n<li><em>Highly Recommended:</em> <strong>Fabrice Donnée</strong> (Michelin, €80–120pp) OR</li>\n<li><em>Alternative:</em> <strong>Pierre Reboul</strong> (Michelin, €80–120pp) OR</li>\n<li><em>Festive-casual:</em> <strong>Le Jasmin</strong> with wine</li>\n<li>Note: Bastille Day is celebrated – restaurants may have special menus</li>\n<li>If in Marseille instead: Bastille Day fireworks on Vieux-Port (typically 10–11 PM, spectacular)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<p><strong>Notes:</strong> Bastille Day (14 July) is French national holiday – celebrate locally. Aix has parades, decorations, festive spirit. This is perfect recharge day before wine country immersion.</p>\n<hr>"}, {"label": "Day 14", "name": "WINE COUNTRY EXPLORATION – CÔTES DE PROVENCE", "heading": "DAY 14 – WEDNESDAY, 15 JULY: WINE COUNTRY EXPLORATION – CÔTES DE PROVENCE", "html": "<h3>DAY 14 – WEDNESDAY, 15 JULY: WINE COUNTRY EXPLORATION – CÔTES DE PROVENCE</h3>\n<p><strong>Theme:</strong> Wine tasting, vineyard landscapes, Provençal villages, wine culture introduction</p>\n<p><strong>Note:</strong> Days 14–17 focus on wine, countryside, and deeper Provence exploration. <strong>No self-driving on wine tasting days</strong> – use taxi/private driver to enable responsible wine enjoyment.</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00 AM</strong> – Breakfast in Aix</li>\n<li>\n<p><strong>8:45 AM</strong> – Arrange <strong>private driver or wine tour taxi</strong></p>\n<ul>\n<li><strong>Option A (Recommended):</strong> Book <strong>wine tour with driver</strong> from Aix</li>\n<li>Companies: <strong>Provence Wine Tours</strong>, <strong>David Tours Provence</strong>, or local hotel can arrange</li>\n<li>Cost: €80–120 per person (includes transportation, flexibility, no drinking-driving worry)</li>\n<li>Driver acts as guide, takes you to tastings, comfortable pace</li>\n<li><strong>Option B:</strong> Call taxi firm, negotiate half-day rate (~€120–150, driver waits)</li>\n<li><strong>Option C:</strong> Hotel concierge arranges driver (slightly premium but reliable)</li>\n</ul>\n</li>\n<li>\n<p><strong>9:00 AM–1:00 PM</strong> – <strong>Guided wine exploration: Côtes de Provence</strong></p>\n<ul>\n<li><strong>Route:</strong> Aix → Puyloubier → Sainte-Victoire wine villages (~45 min)</li>\n<li>Beautiful scenery: Mont Sainte-Victoire (Cézanne&rsquo;s mountain), vineyards, hilltop villages</li>\n<li>Visit 2–3 wineries for tastings (driver knows best stops, can call ahead)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Suggested Wineries (Côtes de Provence):</strong>\n    - <strong>Château de Puyloubier</strong> (excellent Rosé, vineyard views, €10–15 tasting)\n    - <strong>Domaine de l&rsquo;Olivier</strong> (family-run, warm welcome, €10 tasting)\n    - <strong>Mas de Cadenet</strong> (organic, beautiful property, €12 tasting)\n    - <strong>Benefit of driver:</strong> Can access more remote/smaller producers that tourists might miss</p>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch in wine village or winery<ul>\n<li><em>Suggested:</em> <strong>Mas de Cadenet</strong> restaurant (if available) or local village café</li>\n<li><em>Picnic option:</em> Driver can source local provisions; eat at vineyard views</li>\n<li><strong>Key:</strong> Eat well &amp; stay hydrated between tastings (food + water essential)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:00 PM</strong> – Continue wine tasting or explore villages<ul>\n<li>Visit 1–2 more wineries</li>\n<li>Browse hilltop village (<strong>Puyloubier</strong> or <strong>Tholonet</strong> are charming)</li>\n<li>Walk vineyards, take photos, soak in Provençal landscape</li>\n<li><strong>Montagne Sainte-Victoire:</strong> Optional scenic stop/short walk (20–30 min, no hiking)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Afternoon:</strong></p>\n<ul>\n<li><strong>5:30 PM</strong> – Driver returns you to Aix (~45 min)</li>\n<li><strong>Bottles purchased:</strong> Driver can help transport; store at hotel</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:00 PM</strong> – Rest, freshen up, hydrate</li>\n<li><strong>7:30 PM</strong> – Casual dinner (not too heavy after tastings)<ul>\n<li><em>Recommended:</em> <strong>Le Jasmin</strong> (Provençal, relaxed, pairs well with wines you tasted)</li>\n<li><em>Alternative:</em> Light bistro fare</li>\n<li>Pair with one of your purchased Côtes de Provence bottles</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<p><strong>Notes:</strong> </p>\n<ul>\n<li><strong>Driver advantage:</strong> No navigation stress, relaxed pace, professional knowledge of region</li>\n<li><strong>Cost:</strong> €80–150 (split 2 ways = ~€40–75pp, reasonable for safety + expertise)</li>\n<li><strong>Spit, don&rsquo;t swallow:</strong> Professional tastings include spitting (buckets provided) – this is normal &amp; encouraged</li>\n<li><strong>Hydration:</strong> Water between tastings is key</li>\n<li><strong>Save bottles:</strong> Good producers to buy from for Day 20 Châteauneuf comparison</li>\n</ul>\n<hr>"}, {"label": "Day 15", "name": "CÉZANNE & PROVENÇAL COUNTRYSIDE", "heading": "DAY 15 – THURSDAY, 16 JULY: CÉZANNE & PROVENÇAL COUNTRYSIDE", "html": "<h3>DAY 15 – THURSDAY, 16 JULY: CÉZANNE &amp; PROVENÇAL COUNTRYSIDE</h3>\n<p><strong>Theme:</strong> Art heritage, Provençal villages, countryside exploration, Mont Sainte-Victoire deeper dive</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00 AM</strong> – Breakfast in Aix</li>\n<li><strong>8:45 AM</strong> – <strong>No car needed today</strong> – Walking/local transport day<ul>\n<li>Cézanne Studio is in Aix suburbs, accessible by taxi/local bus</li>\n<li>Rest from yesterday&rsquo;s wine tasting driving</li>\n</ul>\n</li>\n<li><strong>9:00 AM–1:00 PM</strong> – <strong>Atelier de Cézanne</strong> (Cézanne&rsquo;s Studio) &amp; surrounding area<ul>\n<li>Historic studio where Cézanne painted, preserved as museum</li>\n<li>Intimate, authentic, fascinating for art lovers</li>\n<li>Entry: €7, allow 45 min–1 hour</li>\n<li><strong>Taxi to location</strong> (~€10–15 from Aix centre) or <strong>local bus</strong></li>\n<li><strong>Then:</strong> Take taxi to <strong>Montagne Sainte-Victoire</strong> scenic viewpoints</li>\n<li>Stop at viewpoints, short walk (20–30 min), take photos</li>\n<li>This is the mountain Cézanne painted 60+ times – very special</li>\n<li>No strenuous hike needed; scenic viewing/photo stops sufficient</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch in Provençal village or return to Aix<ul>\n<li><em>Suggested:</em> <strong>Tholonet</strong> village café (charming hilltop village)</li>\n<li><em>Or return to Aix:</em> <strong>Le Jasmin</strong> or market café</li>\n<li>Light, refreshing after wine day yesterday</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Continued Aix exploration or rest<ul>\n<li>Option A: Revisit favourite Aix site (Musée Granet, Cathedral, galleries)</li>\n<li>Option B: Leisurely café time at Cours Mirabeau with book</li>\n<li>Option C: Rest at accommodation, prepare for tomorrow&rsquo;s wine day</li>\n<li><strong>No driving – relaxation day after wine tastings</strong></li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:00 PM</strong> – Rest, freshen up</li>\n<li><strong>7:30 PM</strong> – Casual dinner (not wine-focused)<ul>\n<li><em>Recommended:</em> <strong>Le Jasmin</strong> (Provençal, warm, pairs with any wine)</li>\n<li><em>Alternative:</em> <strong>Caruso</strong> (Italian) or local bistro</li>\n<li>Light, relaxed meal</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<p><strong>Notes:</strong> Day 15 is <strong>reset day</strong> between wine tastings. Combines art (Cézanne) + scenery (Sainte-Victoire) without wine pressure. Allows body/palate to recover before Day 16 wine exploration. Taxi/local transport only – no car stress.</p>\n<hr>"}, {"label": "Day 16", "name": "LUBERON VILLAGES & WINE", "heading": "DAY 16 – FRIDAY, 17 JULY: LUBERON VILLAGES & WINE", "html": "<h3>DAY 16 – FRIDAY, 17 JULY: LUBERON VILLAGES &amp; WINE</h3>\n<p><strong>Theme:</strong> Hilltop villages, Provençal character, markets, wine region deeper dive</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00 AM</strong> – Breakfast in Aix</li>\n<li>\n<p><strong>8:45 AM</strong> – <strong>Arrange private driver or wine tour taxi</strong> (same as Day 14)</p>\n<ul>\n<li><strong>Option A:</strong> Book <strong>wine tour with driver</strong> (€80–120pp, includes transport + expertise)</li>\n<li><strong>Option B:</strong> Taxi with negotiated half-day rate (~€120–150)</li>\n<li><strong>Option C:</strong> Hotel concierge arranges driver</li>\n</ul>\n</li>\n<li>\n<p><strong>9:00 AM–1:00 PM</strong> – <strong>Guided exploration: Luberon Wine Region</strong></p>\n<ul>\n<li><strong>Route:</strong> Aix → Luberon Region (east of Aix, ~1 hour drive)</li>\n<li>Explore charming hilltop villages: <strong>Lourmarin</strong>, <strong>Ménerbes</strong>, <strong>Bonnieux</strong></li>\n<li>Lourmarin: most famous, castle, Friday morning markets (if timed right)</li>\n<li>Walk narrow streets, browse galleries/antique shops, soak in Provençal character</li>\n<li>Driver knows best village stops &amp; quieter times</li>\n</ul>\n</li>\n</ul>\n<p><strong>Wine Tastings (Luberon):</strong>\n    - Visit 2–3 wineries in area (local <strong>Côtes du Luberon</strong> wines)\n    - <strong>Château de la Dorgonne</strong> (Lourmarin area, welcoming, €10 tasting)\n    - <strong>Château Val Joanis</strong> (organic, beautiful, €12 tasting)\n    - <strong>Benefit:</strong> Different wine style than Côtes de Provence (try both regions)\n    - Driver can source lesser-known producers too</p>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch in Lourmarin<ul>\n<li><em>Recommended:</em> <strong>La Fenêtrelle</strong> (casual-upscale, Provençal, €40–60pp)</li>\n<li><em>Casual:</em> Café in village square</li>\n<li><strong>Critical:</strong> Good lunch, plenty of water between tastings</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Continue village exploration or wine tasting<ul>\n<li>Visit 1–2 more wineries</li>\n<li>Walk Luberon countryside (gentle walks, 20–30 min)</li>\n<li>Browse antique shops, art galleries</li>\n<li>Sit at café, soak in village rhythm</li>\n<li><strong>Ménerbes</strong> &amp; <strong>Bonnieux</strong> quieter alternatives to Lourmarin if prefer</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Afternoon:</strong></p>\n<ul>\n<li><strong>5:30 PM</strong> – Driver returns you to Aix (~1 hour)</li>\n<li><strong>Bottles to carry:</strong> Driver helps manage purchases</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:00 PM</strong> – Rest, hydrate, freshen up</li>\n<li><strong>7:30 PM</strong> – Casual dinner (reflect on wine regions visited)<ul>\n<li><em>Recommended:</em> <strong>Le Jasmin</strong> (Provençal) or local bistro</li>\n<li><em>Pair with:</em> Luberon wine from today&rsquo;s tasting (different character than yesterday&rsquo;s Côtes de Provence)</li>\n<li>Light meal after active day</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<p><strong>Notes:</strong></p>\n<ul>\n<li><strong>Two wine regions compared:</strong> Côtes de Provence (Day 14) vs Côtes du Luberon (Day 16) = educational progression</li>\n<li><strong>Driver advantage:</strong> More remote/smaller producers accessible, relaxed pace</li>\n<li><strong>Cost:</strong> €80–150 split 2 ways = ~€40–75pp (reasonable for safety + expertise + discoveries)</li>\n<li><strong>Quality over quantity:</strong> 2–3 tastings per day is ideal (not 5–6)</li>\n<li><strong>Water + food essential:</strong> Professional wine tasting requires hydration &amp; sustenance</li>\n</ul>\n<hr>"}, {"label": "Day 17", "name": "RESTING DAY IN AIX / OPTIONAL SECOND WINE VISIT", "heading": "DAY 17 – SATURDAY, 18 JULY: RESTING DAY IN AIX / OPTIONAL SECOND WINE VISIT", "html": "<h3>DAY 17 – SATURDAY, 18 JULY: RESTING DAY IN AIX / OPTIONAL SECOND WINE VISIT</h3>\n<p><strong>Theme:</strong> Recharge day, optional deeper wine exploration, preparation for Châteauneuf-du-Pape</p>\n<p><strong>Choice A – Complete Rest Day (Recommended for balance):</strong></p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:30 AM</strong> – Sleep in</li>\n<li><strong>9:00–9:30 AM</strong> – Leisurely breakfast</li>\n<li><strong>10:00 AM–12:00 PM</strong> – Free time<ul>\n<li>Revisit favourite Aix café</li>\n<li>Browse galleries or shops</li>\n<li>Sit with book, relax</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>12:30–2:00 PM</strong> – Lunch (your choice)<ul>\n<li><em>Recommended:</em> <strong>Manon les Suds</strong> or <strong>Le Jasmin</strong></li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>2:30–5:30 PM</strong> – Unstructured<ul>\n<li>Nap, spa, read</li>\n<li>Wander Aix slowly</li>\n<li>Prepare for wine-focused Châteauneuf days ahead</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Special dinner (book ahead)<ul>\n<li><em>Recommended:</em> <strong>Fabrice Donnée</strong> (Michelin, €80–120pp)</li>\n<li>Celebrate Aix week with elegant meal</li>\n</ul>\n</li>\n</ul>\n<hr>\n<p><strong>Choice B – Northern Rhône Valley Wine Exploration:</strong></p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:00 AM</strong> – Breakfast</li>\n<li><strong>8:45 AM</strong> – Keep rental car</li>\n<li><strong>9:00 AM–1:00 PM</strong> – Drive to <strong>Côtes du Rhône</strong> wine region (north of Aix, ~1 hour)<ul>\n<li>Explore villages &amp; wineries around Draguignan/Brignoles area</li>\n<li>Different wine character than Côtes de Provence</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch in wine region</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Wine tasting &amp; village exploration</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:00 PM</strong> – Return to Aix</li>\n<li><strong>7:30 PM</strong> – Dinner</li>\n</ul>\n<hr>\n<p><strong>Recommended:</strong> Choice A (rest day) – you&rsquo;ve explored countryside Days 14–16. Recharge before final days.</p>\n<p><strong>Overnight:</strong> Aix-en-Provence</p>\n<hr>"}, {"label": "Day 18", "name": "TRAVEL TO CHÂTEAUNEUF-DU-PAPE", "heading": "DAY 18 – SUNDAY, 19 JULY: TRAVEL TO CHÂTEAUNEUF-DU-PAPE", "html": "<h3>DAY 18 – SUNDAY, 19 JULY: TRAVEL TO CHÂTEAUNEUF-DU-PAPE</h3>\n<p><strong>Theme:</strong> Transition to wine country retreat, slower pace</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Leisurely breakfast in Aix</li>\n<li><strong>10:00–11:00 AM</strong> – Final Aix stroll or last-minute shopping<ul>\n<li>Revisit favourite café on Cours Mirabeau</li>\n<li>Pick up last wine/provisions from market</li>\n</ul>\n</li>\n</ul>\n<p><strong>Midday:</strong></p>\n<ul>\n<li><strong>11:30 AM</strong> – Check out of Aix accommodation<ul>\n<li>Arrange luggage handling if needed</li>\n</ul>\n</li>\n<li><strong>12:00–1:00 PM</strong> – Light lunch in Aix (before travel)<ul>\n<li><em>Suggested:</em> Quick café or picnic to go</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon – TRAVEL TO CHÂTEAUNEUF-DU-PAPE:</strong></p>\n<ul>\n<li>\n<p><strong>1:30 PM</strong> – Depart Aix for Châteauneuf-du-Pape</p>\n<ul>\n<li><strong>Route Option 1 (Car – if keeping rental):</strong> Aix → Avignon → Châteauneuf (~1.5 hours total, scenic route via N100 or A7)</li>\n<li><strong>Route Option 2 (Train + taxi):</strong> Aix → Avignon train (~35 min), then taxi to Châteauneuf (~15 min, €25–30)</li>\n<li><strong>Recommendation:</strong> Car is more convenient for wine region exploration later</li>\n<li>Beautiful countryside drive, golden light in afternoon</li>\n</ul>\n</li>\n<li>\n<p><strong>3:00–3:30 PM</strong> – Arrive Châteauneuf-du-Pape</p>\n<ul>\n<li>Check into <strong>Hostellerie du Château des Fines Roches</strong></li>\n<li>Settle in, explore accommodation grounds (château is special!)</li>\n<li>Rest, freshen up</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Afternoon:</strong></p>\n<ul>\n<li><strong>4:30–5:30 PM</strong> – Explore Châteauneuf village<ul>\n<li>Walk main street</li>\n<li>Browse wine shop (pick up evening wine)</li>\n<li>Panoramic views of vineyard landscape</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:00 PM</strong> – Aperitif at accommodation terrace (if available)<ul>\n<li>Champagne or local wine</li>\n<li>Watch sunset over Rhône valley</li>\n</ul>\n</li>\n<li><strong>7:30 PM</strong> – Dinner<ul>\n<li><em>If at Château:</em> Hotel restaurant (likely excellent, often Michelin-level)</li>\n<li><em>Alternative:</em> <strong>L&rsquo;Oustaou de Baumanière</strong> (nearby village, upscale, €80–120pp)</li>\n<li><em>Casual:</em> Picnic dinner in room with wine from shop</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Châteauneuf-du-Pape (Hostellerie du Château des Fines Roches)</p>\n<p><strong>Notes:</strong> Day 19 transitions to wine-focused couple retreat. Château accommodation is special – enjoy it. Châteauneuf is wine capital – next days will feature wine-tasting intensively.</p>\n<hr>\n<h2>PART 3: CHÂTEAUNEUF-DU-PAPE (19–20 JULY) – WINE IMMERSION &amp; CASTLE RETREAT</h2>\n<p><strong>Theme:</strong> Wine capital, prestigious vineyard tours, sophisticated rural retreat, French wine culture<br>\n<strong>Accommodation:</strong> Hostellerie du Château des Fines Roches (special!)<br>\n<strong>Transport Strategy:</strong> Car (essential for vineyard access); local walking<br>\n<strong>Vibe:</strong> Wine-focused, luxurious, romantic, educational</p>\n<hr>"}, {"label": "Day 19+", "name": "EVENING SETUP (see above)", "heading": "DAY 19 CONTINUATION – SUNDAY, 19 JULY: EVENING SETUP (see above)", "html": "<h3>DAY 19 CONTINUATION – SUNDAY, 19 JULY: EVENING SETUP (see above)</h3>"}, {"label": "Day 20", "name": "CHÂTEAUNEUF WINE IMMERSION", "heading": "DAY 20 – MONDAY, 20 JULY: CHÂTEAUNEUF WINE IMMERSION", "html": "<h3>DAY 20 – MONDAY, 20 JULY: CHÂTEAUNEUF WINE IMMERSION</h3>\n<p><strong>Theme:</strong> Wine tastings, vineyard education, prestigious producers, food pairing</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Leisurely breakfast at Château (enjoy the setting!)</li>\n<li><strong>10:00–11:00 AM</strong> – Rest/explore Château grounds<ul>\n<li>Pool, gardens, terraces</li>\n<li>Soak in luxury &amp; countryside calm</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Morning–Afternoon:</strong></p>\n<ul>\n<li><strong>11:00 AM–3:00 PM</strong> – <strong>Châteauneuf Wine Tastings</strong> (book ahead)<ul>\n<li>Visit 2–3 prestigious wineries</li>\n<li>Château du Pape (famous producer, excellent tour)</li>\n<li>Château Rayas (legendary, harder to access but worth trying)</li>\n<li>Domaine du Vieux Télégraphe (highly respected, welcoming)</li>\n<li>Allow 1.5–2 hours per winery (tasting + tour)</li>\n<li>Cost: €15–25 per tasting; buy bottles if want</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch at winery or village<ul>\n<li><em>Suggested:</em> Picnic lunch with provisions from Avignon market</li>\n<li><em>Casual:</em> Village café in Châteauneuf</li>\n<li>Pair with tasted wines</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:00 PM</strong> – Continue tastings or rest<ul>\n<li>Option A: Visit additional winery</li>\n<li>Option B: Rest at Château, enjoy pool/gardens</li>\n<li>Option C: Leisurely walk vineyards</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Freshen up at Château</li>\n<li><strong>7:00 PM</strong> – Aperitif on terrace<ul>\n<li>Sip local wine, watch sunset over vineyard landscape</li>\n</ul>\n</li>\n<li><strong>7:30 PM</strong> – Special Wine Dinner<ul>\n<li><em>At Château:</em> Hotel restaurant (exceptional, likely Michelin, €70–120pp, book ahead)</li>\n<li><em>Nearby:</em> <strong>L&rsquo;Oustaou de Baumanière</strong> (upscale, wine-focused pairings)</li>\n<li><strong>Plan:</strong> 4–5 course meal paired with Châteauneuf wines you tasted</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Châteauneuf-du-Pape</p>\n<p><strong>Notes:</strong> Châteauneuf is wine capital – Day 20 is wine-immersion day. Château accommodation + wine tastings + paired dinner = special, memorable experience. Book winery tastings ahead (some require reservation). Château du Pape &amp; Domaine du Vieux Télégraphe are most visitor-friendly.</p>\n<hr>\n<h2>PART 4: CASSIS (20–25 JULY) – MEDITERRANEAN DRAMA &amp; CALANQUES</h2>\n<p><strong>Theme:</strong> Dramatic coastal scenery, calanques (fjord-like coves), boating, seafood, Mediterranean beauty<br>\n<strong>Accommodation:</strong> Cassis harbour area or village centre (confirm booking)<br>\n<strong>Transport Strategy:</strong> Car from Château (scenic drive ~2 hours); local walking &amp; boat tours<br>\n<strong>Vibe:</strong> Dramatic coastal beauty, active exploration, swimming, seafood indulgence</p>\n<hr>"}, {"label": "Day 21", "name": "TRAVEL TO CASSIS & COASTAL ARRIVAL", "heading": "DAY 21 – TUESDAY, 21 JULY: TRAVEL TO CASSIS & COASTAL ARRIVAL", "html": "<h3>DAY 21 – TUESDAY, 21 JULY: TRAVEL TO CASSIS &amp; COASTAL ARRIVAL</h3>\n<p><strong>Theme:</strong> Transition to Mediterranean coast, dramatic scenery introduction</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Leisurely breakfast at Château<ul>\n<li>Final Châteauneuf morning</li>\n</ul>\n</li>\n<li><strong>10:00–11:00 AM</strong> – Check out, prepare for travel<ul>\n<li>Pack, settle bill, return car rental if needed</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Morning–Afternoon – TRAVEL TO CASSIS:</strong></p>\n<ul>\n<li>\n<p><strong>11:00 AM</strong> – Depart Châteauneuf for Cassis</p>\n<ul>\n<li><strong>Route:</strong> Châteauneuf → Avignon → Marseille → Cassis (~2 hours total)</li>\n<li><strong>Via Car (Recommended):</strong> Scenic drive via A7 &amp; A50, beautiful Provence landscape</li>\n<li><strong>Via Train (Alternative):</strong> Châteauneuf → Avignon train, then Avignon → Marseille, then train/bus to Cassis (longer, ~3–4 hours)</li>\n<li><strong>Recommendation:</strong> Keep rental car for Cassis area (better for Calanques access)</li>\n</ul>\n</li>\n<li>\n<p><strong>1:00–1:30 PM</strong> – Arrive Cassis</p>\n<ul>\n<li>Check into accommodation (harbour/waterfront location ideal)</li>\n<li>Settle in, freshen up</li>\n</ul>\n</li>\n</ul>\n<p><strong>Early Afternoon:</strong></p>\n<ul>\n<li><strong>2:00–3:00 PM</strong> – First Cassis exploration<ul>\n<li>Walk to <strong>Port de Cassis</strong> (charming small harbour)</li>\n<li>Watch fishing boats, yachts</li>\n<li>Browse waterfront restaurants &amp; cafés</li>\n<li>Soak in Mediterranean atmosphere</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Afternoon:</strong></p>\n<ul>\n<li><strong>3:30–5:30 PM</strong> – Relax at accommodation or beach<ul>\n<li><strong>Plage de Cassis</strong> (main village beach, calm, family-friendly)</li>\n<li>Swim, relax, adjust to coastal pace</li>\n<li>Aperitif at harbour café</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Welcome-to-Cassis dinner<ul>\n<li><em>Highly Recommended:</em> <strong>Chez Padovani</strong> (upscale seafood, excellent, €70–100pp, book ahead)</li>\n<li><em>Alternative:</em> <strong>La Presqu&rsquo;île</strong> (casual-upscale, seafood, €50–70pp)</li>\n<li><em>Casual:</em> <strong>Restaurant du Port</strong> (simple, waterfront)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Cassis</p>\n<p><strong>Notes:</strong> Cassis is dramatic shift from Aix/Châteauneuf – from countryside to rugged Mediterranean coast. Village is small, charming, quintessentially Provençal. Harbour is beautiful. Start relaxing into final week of trip.</p>\n<hr>"}, {"label": "Day 22", "name": "CALANQUES BOAT TOUR & COASTAL DRAMA", "heading": "DAY 22 – WEDNESDAY, 22 JULY: CALANQUES BOAT TOUR & COASTAL DRAMA", "html": "<h3>DAY 22 – WEDNESDAY, 22 JULY: CALANQUES BOAT TOUR &amp; COASTAL DRAMA</h3>\n<p><strong>Theme:</strong> Dramatic limestone cliffs, fjord-like coves, swimming, Mediterranean beauty</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:30 AM</strong> – Breakfast in Cassis</li>\n<li>\n<p><strong>9:15 AM</strong> – Book <strong>Calanques Boat Tour</strong></p>\n<ul>\n<li><strong>Book ahead:</strong> Various operators (€30–50pp, 2–3 hours)</li>\n<li>Tours depart Cassis harbour, visit multiple calanques</li>\n<li>Calanques: deep fjord-like inlets with turquoise water &amp; white limestone cliffs</li>\n<li>Swimming stops included, stunning scenery</li>\n</ul>\n</li>\n<li>\n<p><strong>9:30–11:30 AM</strong> – <strong>Calanques Boat Tour</strong></p>\n<ul>\n<li>Visit <strong>Calanque d&rsquo;En-Vau</strong>, <strong>Port-Miou</strong>, <strong>Port-Pin</strong> (most famous)</li>\n<li>Dramatic cliffs, crystal-clear water, Mediterranean energy</li>\n<li>Swim in coves, photographs</li>\n<li>Experienced boatman commentary on geology &amp; wildlife</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Morning/Lunch:</strong></p>\n<ul>\n<li><strong>12:00–1:30 PM</strong> – Lunch in Cassis<ul>\n<li><em>Recommended:</em> <strong>Chez Padovani</strong> (book for lunch, fresh seafood, €50–70pp)</li>\n<li><em>Casual:</em> Harbour-side café</li>\n<li>Pair with local white wine (Cassis wine is local speciality)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>2:30–5:30 PM</strong> – Beach time or additional exploration<ul>\n<li><strong>Option A:</strong> Relax at <strong>Plage de Cassis</strong> (beach rest after boat tour)</li>\n<li><strong>Option B:</strong> Hike <strong>Port-Miou hiking trail</strong> (cliff-top walk, 1–2 hours, dramatic views)</li>\n<li><strong>Option C:</strong> Explore village, browse galleries/shops, café time</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:00 PM</strong> – Freshen up</li>\n<li><strong>7:00 PM</strong> – Aperitif at harbour café<ul>\n<li>Watch sunset over Mediterranean</li>\n<li>Glass of Cassis wine</li>\n</ul>\n</li>\n<li><strong>7:30 PM</strong> – Dinner<ul>\n<li><em>Recommended:</em> <strong>Clos Sainte-Magdeleine</strong> (Michelin, wine-focused, €80–120pp, book ahead)</li>\n<li><em>Alternative:</em> <strong>Chez Padovani</strong></li>\n<li>Focus on seafood &amp; local wine</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Cassis</p>\n<p><strong>Notes:</strong> Day 22 is highlight of Cassis stay – Calanques boat tour is spectacular. Book tour ahead. Swimming in turquoise water under dramatic cliffs is unforgettable. Weather dependent – check forecast. Bring sunscreen &amp; swimwear.</p>\n<hr>"}, {"label": "Day 23", "name": "CASSIS EXPLORATION & LEISURE", "heading": "DAY 23 – THURSDAY, 23 JULY: CASSIS EXPLORATION & LEISURE", "html": "<h3>DAY 23 – THURSDAY, 23 JULY: CASSIS EXPLORATION &amp; LEISURE</h3>\n<p><strong>Theme:</strong> Coastal relaxation, optional wine tasting, Mediterranean pacing</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Sleep in, leisurely breakfast</li>\n<li><strong>10:00 AM–12:30 PM</strong> – Free choice morning<ul>\n<li><strong>Option A:</strong> Beach time at <strong>Plage de Cassis</strong> (swim, relax)</li>\n<li><strong>Option B:</strong> Explore villages nearby (<strong>La Ciotat</strong>, charming town, 10 min drive)</li>\n<li><strong>Option C:</strong> Optional winery visit (<strong>Bandol wine region</strong>, 20 min east)</li>\n<li><strong>Option D:</strong> Sit at café, read, relax</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch (your choice)<ul>\n<li><em>Recommended:</em> <strong>La Presqu&rsquo;île</strong> (casual-upscale, fresh fish, €50–70pp)</li>\n<li><em>Casual:</em> Harbour café</li>\n<li><em>Special:</em> <strong>Clos Sainte-Magdeleine</strong> (if available for lunch)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Leisurely exploration<ul>\n<li><strong>Option A:</strong> <strong>Bandol Wine Tasting</strong> (if interested)</li>\n<li>Drive to Bandol (~20 min), visit 1–2 wineries</li>\n<li><strong>Château de Pibarnon</strong> (excellent Bandol red, scenic, €12 tasting)</li>\n<li><strong>Domaine Tempier</strong> (prestigious, €15 tasting)</li>\n<li>Return to Cassis ~5:30 PM</li>\n<li><strong>Option B:</strong> Final beach/cove exploration</li>\n<li>Hike to secluded coves, swim</li>\n<li><strong>Option C:</strong> Rest at accommodation, prepare for Marseille tomorrow</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Casual dinner<ul>\n<li><em>Recommended:</em> <strong>La Presqu&rsquo;île</strong> or <strong>Chez Padovani</strong></li>\n<li>Light meal, good wine, relaxed pace</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Cassis</p>\n<p><strong>Notes:</strong> Day 23 is flexible – Cassis is small, so options are limited. Bandol wine option is good if wine-interested; otherwise beach/rest day is appropriate after active boat tour yesterday.</p>\n<hr>"}, {"label": "Day 24", "name": "CASSIS TO MARSEILLE", "heading": "DAY 24 – FRIDAY, 25 JULY: CASSIS TO MARSEILLE", "html": "<h3>DAY 24 – FRIDAY, 25 JULY: CASSIS TO MARSEILLE</h3>\n<p><strong>Theme:</strong> Transition to urban finale, Mediterranean to cosmopolitan shift</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Final Cassis breakfast<ul>\n<li>Sit at harbour café, soak in morning light</li>\n<li>Take final photos</li>\n</ul>\n</li>\n<li><strong>10:00–11:30 AM</strong> – Last harbour walk or beach visit<ul>\n<li>Final Mediterranean swim if wanted</li>\n<li>Browse shops, pick up souvenirs</li>\n</ul>\n</li>\n</ul>\n<p><strong>Midday Travel:</strong></p>\n<ul>\n<li><strong>12:00 PM</strong> – Check out of Cassis accommodation</li>\n<li><strong>12:15–12:45 PM</strong> – Depart for Marseille<ul>\n<li><strong>Route:</strong> Cassis → Marseille (~1 hour by car or train)</li>\n<li><strong>Via Car (Recommended):</strong> Scenic drive along coast, scenic views</li>\n<li><strong>Via Train:</strong> Direct from Cassis, ~1 hour, €10–15</li>\n<li><strong>Return rental car:</strong> Drop at Marseille station or airport (if returning)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Early Afternoon:</strong></p>\n<ul>\n<li><strong>1:30–2:00 PM</strong> – Arrive Marseille<ul>\n<li>Check into accommodation in <strong>Vieux-Port/Le Panier</strong> area (vibrant, central)</li>\n<li>Settle in, freshen up</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Afternoon:</strong></p>\n<ul>\n<li><strong>2:30–5:00 PM</strong> – Marseille arrival exploration<ul>\n<li>Walk <strong>Vieux-Port</strong> (Old Port)</li>\n<li>Watch fishermen, boats, water taxis</li>\n<li>Vibrant Mediterranean port energy</li>\n<li>Explore <strong>Le Panier district</strong></li>\n<li>Narrow colourful streets, street art, galleries</li>\n<li>Bohemian, authentic Marseille character</li>\n<li>Browse shops, cafés</li>\n</ul>\n</li>\n</ul>\n<p><strong>Early Evening:</strong></p>\n<ul>\n<li><strong>5:30 PM</strong> – Rest at accommodation</li>\n<li><strong>6:00 PM</strong> – Aperitif at Vieux-Port café<ul>\n<li>Watch evening light on water</li>\n<li>Sip wine, transition to urban Marseille energy</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Welcome-to-Marseille dinner<ul>\n<li><em>Highly Recommended:</em> <strong>Chez Fonfon</strong> (legendary bouillabaisse, €70–100pp, book ahead!)</li>\n<li><em>Alternative:</em> <strong>Cote Ouest</strong> (casual-upscale, seafood, €50–70pp)</li>\n<li><em>Casual:</em> <strong>Le Petit Galinier</strong> (colourful, fun)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Marseille</p>\n<p><strong>Notes:</strong> Day 25 transitions from quiet Cassis to urban Marseille. Vieux-Port is energetic &amp; authentic. Chez Fonfon&rsquo;s bouillabaisse is institution – book ahead. Last 3 days shift from beaches to city energy.</p>\n<h
