r>\n<h2>PART 5: MARSEILLE (25–28 JULY) – URBAN MEDITERRANEAN FINALE</h2>\n<p><strong>Theme:</strong> Urban energy, Mediterranean history, bouillabaisse &amp; seafood, island excursions, French urban culture<br>\n<strong>Accommodation:</strong> Vieux-Port or Le Panier district (vibrant, walkable)<br>\n<strong>Transport Strategy:</strong> Walking locally, ferry for islands, public transport in city<br>\n<strong>Vibe:</strong> Energetic, authentic, gritty-charming, seafood-focused, final adventure</p>\n<hr>"}, {"label": "Day 25+", "name": "EVENING (see above)", "heading": "DAY 25 CONTINUATION – FRIDAY, 25 JULY: EVENING (see above)", "html": "<h3>DAY 25 CONTINUATION – FRIDAY, 25 JULY: EVENING (see above)</h3>"}, {"label": "Day 26", "name": "MARSEILLE EXPLORATION & MUSEUMS", "heading": "DAY 26 – SATURDAY, 26 JULY: MARSEILLE EXPLORATION & MUSEUMS", "html": "<h3>DAY 26 – SATURDAY, 26 JULY: MARSEILLE EXPLORATION &amp; MUSEUMS</h3>\n<p><strong>Theme:</strong> Urban history, art/culture, Vieux-Port energy, Mediterranean character</p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:30 AM</strong> – Café breakfast in Le Panier<ul>\n<li><em>Suggested:</em> Local café on narrow street, pastry &amp; coffee</li>\n</ul>\n</li>\n<li><strong>9:00 AM–12:30 PM</strong> – Explore Le Panier District (depth)<ul>\n<li>Narrow colourful streets, street art murals, galleries, boutiques</li>\n<li><strong>Cathédrale La Major</strong> (impressive 19th-century Romanesque, interiors ornate)</li>\n<li>Browse local shops, produce stands</li>\n<li>Soak in bohemian Marseille energy</li>\n<li>Photos, wandering, no rush</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch in Le Panier<ul>\n<li><em>Recommended:</em> <strong>L&rsquo;Épée de Bois</strong> (casual, colourful, local vibe, €30–45pp)</li>\n<li><em>Alternative:</em> <strong>Chez Etienne</strong> (traditional Provençal, warm, €40–60pp)</li>\n<li><em>Casual:</em> Neighbourhood café</li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Museum option or leisure<ul>\n<li><strong>Option A:</strong> <strong>MUCEM</strong> (Museum of Mediterranean Civilization)</li>\n<li>Modern architecture, excellent views, interactive exhibits</li>\n<li>Worth 1.5–2 hours for culture lovers</li>\n<li>Entry: €12, free terraces with views</li>\n<li><strong>Option B:</strong> <strong>Musée de la Vieille Charité</strong> (Renaissance building, art/ethnography)</li>\n<li>Beautiful complex, cultural history, calmer vibe</li>\n<li><strong>Option C:</strong> Walk <strong>Vieux-Port</strong>, sit at café, people-watch, relax</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>6:30 PM</strong> – Aperitif on Vieux-Port waterfront<ul>\n<li>Glass of pastis or wine</li>\n<li>Watch boats, sunset</li>\n</ul>\n</li>\n<li><strong>7:30 PM</strong> – Special Marseille dinner<ul>\n<li><em>Highly Recommended:</em> <strong>Chez Fonfon</strong> (book ahead if not done yesterday!)</li>\n<li>Legendary bouillabaisse, €70–100pp, institution</li>\n<li><em>Alternative:</em> <strong>Cote Ouest</strong> (casual-upscale, fresh seafood, €50–70pp)</li>\n<li><em>Modern:</em> <strong>Restaurant Mama Shelter</strong> (trendy, Mediterranean, €50–70pp)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Overnight:</strong> Marseille</p>\n<p><strong>Notes:</strong> Day 26 is full Marseille immersion – culture, food, urban energy. MUCEM is worth it for views &amp; architecture. Chez Fonfon&rsquo;s bouillabaisse is must-try if staying another night. Le Panier&rsquo;s street art &amp; colour are Instagrammable.</p>\n<hr>"}, {"label": "Day 27", "name": "FRIOUL ISLANDS OR LEISURE", "heading": "DAY 27 – SUNDAY, 27 JULY: FRIOUL ISLANDS OR LEISURE", "html": "<h3>DAY 27 – SUNDAY, 27 JULY: FRIOUL ISLANDS OR LEISURE</h3>\n<p><strong>Theme:</strong> Island escape, Mediterranean drama, or urban relaxation</p>\n<p><strong>Choice A – Frioul Islands Boat Trip (Recommended for activity):</strong></p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:30 AM</strong> – Breakfast in Marseille</li>\n<li><strong>9:15 AM</strong> – Ferry from <strong>Marseille Vieux-Port to Îles du Frioul</strong><ul>\n<li>Ferry cost: €10–15 per person each way</li>\n<li>20–30 min journey; daily service, comfortable boat</li>\n<li>Views of Marseille coast during journey</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Morning–Afternoon:</strong></p>\n<ul>\n<li><strong>10:00 AM–4:00 PM</strong> – Îles du Frioul exploration<ul>\n<li><strong>Île d&rsquo;If:</strong> Historic Château d&rsquo;If (Dumas, Monte Cristo fame)</li>\n<li>Ancient fortress, dramatic location, museum entry €6</li>\n<li>Fascinating history, views of Marseille &amp; Mediterranean</li>\n<li><strong>Île de Ratonneau:</strong> Quieter island, fewer tourists, good for swimming</li>\n<li>Beach areas, picnic spots, swimming in clear water</li>\n<li><strong>Île Pomègues:</strong> Small, peaceful, less visited</li>\n<li>Ferry stops at multiple islands – hop on/off as preferred</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Island café (basic but atmospheric) or <strong>picnic</strong><ul>\n<li>Bring provisions from Marseille (cheese, bread, wine, fruit)</li>\n<li>Eat on island beach or at café</li>\n</ul>\n</li>\n</ul>\n<p><strong>Late Afternoon:</strong></p>\n<ul>\n<li><strong>3:30 PM</strong> – Swim in coves, relax on beach</li>\n<li><strong>4:15 PM</strong> – Ferry back to Marseille (~30 min)</li>\n</ul>\n<p><strong>Early Evening:</strong></p>\n<ul>\n<li><strong>5:00 PM</strong> – Rest at accommodation, freshen up</li>\n<li><strong>6:00 PM</strong> – Aperitif at café</li>\n<li><strong>7:30 PM</strong> – Casual dinner<ul>\n<li><em>Suggested:</em> <strong>Le Petit Galinier</strong> or <strong>Chez Etienne</strong></li>\n<li>Light meal after active island day</li>\n</ul>\n</li>\n</ul>\n<hr>\n<p><strong>Choice B – Marseille Leisurely Day:</strong></p>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>9:00 AM</strong> – Sleep in, café breakfast</li>\n<li><strong>10:00 AM–12:30 PM</strong> – Optional exploration<ul>\n<li><strong>Basilique Notre-Dame de la Garde</strong> (cable car €8 or 20 min walk, panoramic views)</li>\n<li>Beautiful white basilica on hilltop, 360° views of city &amp; sea</li>\n<li>Stunning, especially in morning light</li>\n<li>Or: Leisurely walk <strong>Corniche Président Kennedy</strong> (coastal promenade)</li>\n<li>6 km coastal walk, cafés, swimming spots</li>\n</ul>\n</li>\n</ul>\n<p><strong>Lunch:</strong></p>\n<ul>\n<li><strong>1:00–2:30 PM</strong> – Lunch<ul>\n<li><em>Suggested:</em> <strong>Chez Fonfon</strong>, <strong>Cote Ouest</strong>, or <strong>Le Petit Galinier</strong></li>\n</ul>\n</li>\n</ul>\n<p><strong>Afternoon:</strong></p>\n<ul>\n<li><strong>3:00–5:30 PM</strong> – Relaxed afternoon<ul>\n<li>MUCEM if interested, or simply sit at café</li>\n<li>Shopping, galleries, rest</li>\n</ul>\n</li>\n</ul>\n<p><strong>Evening:</strong></p>\n<ul>\n<li><strong>7:30 PM</strong> – Dinner<ul>\n<li><em>Suggested:</em> <strong>Cote Ouest</strong> or casual neighbourhood bistro</li>\n</ul>\n</li>\n</ul>\n<hr>\n<p><strong>Recommended:</strong> Choice A (Islands) – adds activity &amp; novelty to final days. Île d&rsquo;If is fascinating.</p>\n<p><strong>Overnight:</strong> Marseille</p>\n<p><strong>Notes:</strong> Frioul Islands are short ferry, so very accessible. Château d&rsquo;If is interesting historical site (Monte Cristo connection). Île de Ratonneau is quiet alternative if Île d&rsquo;If crowded. Either choice works – balance activity with rest for final days.</p>\n<hr>"}, {"label": "Day 28", "name": "DEPARTURE", "heading": "DAY 28 – MONDAY, 28 JULY: DEPARTURE", "html": "<h3>DAY 28 – MONDAY, 28 JULY: DEPARTURE</h3>\n<p><strong>Very Early Morning:</strong></p>\n<ul>\n<li><strong>6:30 AM</strong> – Wake up, pack, quick breakfast (or eat at airport)</li>\n<li><strong>7:00 AM</strong> – Check out of Marseille accommodation</li>\n<li><strong>7:15 AM</strong> – Depart for Marseille Provence Airport (MRS)<ul>\n<li><strong>Route:</strong> Marseille Vieux-Port → MRS (~30 km east, ~45 min–1 hour by car/taxi/shuttle/public transport)</li>\n<li><strong>Options:</strong></li>\n<li><strong>Shuttle/Airport Bus:</strong> From Vieux-Port, €10–15, ~45 min (most economical)</li>\n<li><strong>Taxi:</strong> €40–60, ~45 min (convenient if luggage heavy)</li>\n<li><strong>Rental car:</strong> If keeping for last day, return at airport rental centre</li>\n<li><strong>Arrive airport:</strong> 8:15–8:45 AM (for 10:55 AM flight)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Morning:</strong></p>\n<ul>\n<li><strong>8:30–9:00 AM</strong> – Check in, security, boarding<ul>\n<li>Early enough for 10:55 AM flight</li>\n</ul>\n</li>\n<li><strong>9:00–10:55 AM</strong> – Airport lounge/café, final pastis/coffee, read</li>\n<li><strong>10:55 AM</strong> – Flight departs Marseille for home</li>\n</ul>\n<p><strong>Goodbye France:</strong></p>\n<ul>\n<li>Reflect on 27 days: family week in Antibes, wine country exploration in Aix/Châteauneuf, coastal beauty in Cassis, urban finale in Marseille</li>\n<li>Memories: beaches, markets, calanques, wine tastings, bouillabaisse, Provençal countryside</li>\n<li>Already planning return trip?</li>\n</ul>\n<p><strong>Notes:</strong> Day 28 is anticlimactic but necessary. Keep it simple – focus on flight logistics. Arrive airport early for peace of mind. Last Marseille memory is likely airport café pastry &amp; coffee – fitting finale.</p>\n<hr>\n<h2>LOGISTICS SUMMARY</h2>"}], "appendix_html": "<h3><strong>Flights</strong></h3>\n<table>\n<thead>\n<tr>\n<th>Leg</th>\n<th>Date</th>\n<th>From</th>\n<th>To</th>\n<th>Time</th>\n<th>Notes</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Inbound</td>\n<td>Thursday 2 July</td>\n<td>Home</td>\n<td>Nice (NCE)</td>\n<td>10:00 AM</td>\n<td>Family of 4</td>\n</tr>\n<tr>\n<td>Mid-trip</td>\n<td>Thursday 9 July</td>\n<td>Nice (NCE)</td>\n<td>Home</td>\n<td>10:45 AM</td>\n<td>Sons (19 &amp; 17) return</td>\n</tr>\n<tr>\n<td>Outbound</td>\n<td>Tuesday 28 July</td>\n<td>Marseille (MRS)</td>\n<td>Home</td>\n<td>10:55 AM</td>\n<td>2 adults</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>Accommodation Summary</strong></h3>\n<table>\n<thead>\n<tr>\n<th>Location</th>\n<th>Dates</th>\n<th>Nights</th>\n<th>Purpose</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Antibes</td>\n<td>2–9 July</td>\n<td>7</td>\n<td>Family week, Riviera</td>\n</tr>\n<tr>\n<td>Aix-en-Provence</td>\n<td>9–19 July</td>\n<td>10</td>\n<td>Couple exploration, Provence</td>\n</tr>\n<tr>\n<td>Châteauneuf-du-Pape</td>\n<td>19–20 July</td>\n<td>1</td>\n<td>Wine immersion, castle retreat</td>\n</tr>\n<tr>\n<td>Cassis</td>\n<td>20–25 July</td>\n<td>5</td>\n<td>Calanques, coastal</td>\n</tr>\n<tr>\n<td>Marseille</td>\n<td>25–28 July</td>\n<td>3</td>\n<td>Urban finale, Mediterranean</td>\n</tr>\n<tr>\n<td><strong>Total</strong></td>\n<td></td>\n<td><strong>27 nights</strong></td>\n<td></td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3><strong>Transport Strategy</strong></h3>\n<p><strong>Antibes Week (Family):</strong></p>\n<ul>\n<li>Local: Walking + local buses in Antibes</li>\n<li>Day trips: SNCF trains to Nice/Cannes (15–25 min, €5–15)</li>\n</ul>\n<p><strong>Aix Week (Couple Days 9–17):</strong></p>\n<ul>\n<li>Local: Walking in Aix Old Town</li>\n<li>Day trips: SNCF trains to Avignon (Day 10) + Alps or Arles (Day 11 – car rental OR day trip tour)</li>\n<li>Countryside (Days 11, 12, 14, 16): <strong>Taxi/Private Driver Services</strong> (NOT self-drive)<ul>\n<li>Day 11: Car rental if Alps option (or train to Arles)</li>\n<li>Day 12: Car rental for Lavender fields trip</li>\n<li>Days 14 &amp; 16: <strong>Private driver/wine tour taxi</strong> for responsible wine tasting</li>\n<li>Cost: €80–150 per day split 2 ways = €40–75pp</li>\n<li>Benefit: Safe, professional, knowledgeable, stress-free</li>\n<li>Day 15: No car – taxi/walking day (rest after wine tastings)</li>\n</ul>\n</li>\n</ul>\n<p><strong>Why taxi/driver for wine days?</strong></p>\n<ul>\n<li>✅ Safe – no driving after wine consumption</li>\n<li>✅ Knowledgeable – guides know best wineries, lesser-known producers</li>\n<li>✅ Relaxed – you can enjoy tastings without navigation stress</li>\n<li>✅ Flexible – driver knows good lunch spots, can manage purchases</li>\n<li>✅ Professional – understands wine etiquette, pacing, hydration needs</li>\n</ul>\n<p><strong>Châteauneuf Week (Day 20):</strong></p>\n<ul>\n<li>Keep rental car from Day 14–20 for vineyard access (convenient)</li>\n<li>Local: Walking in village &amp; car for winery visits</li>\n</ul>\n<p><strong>Cassis Week (Days 21–25):</strong></p>\n<ul>\n<li>Continue rental car for Calanques access &amp; flexibility</li>\n<li>Local: Walking in village, boat tours for Calanques</li>\n</ul>\n<p><strong>Marseille Finale (Days 25–28):</strong></p>\n<ul>\n<li>Return rental car at Marseille</li>\n<li>Local: Walking in Vieux-Port/Le Panier</li>\n<li>Ferry for Frioul Islands (€10–15 return)</li>\n</ul>\n<p><strong>Transport Costs Breakdown:</strong></p>\n<ul>\n<li><strong>Car Rental:</strong> Days 11–12, 18–20 (Lavender + Alps, Châteauneuf travel) = ~5 days @ €35–50/day = €175–250<ul>\n<li>Fuel: ~€60–80</li>\n<li><strong>Subtotal car:</strong> €235–330</li>\n</ul>\n</li>\n<li><strong>Taxi/Private Driver:</strong> Days 14, 16 (wine tastings) = 2 days @ €80–120 split 2 ways = €160–240 total (€80–120pp)<ul>\n<li><strong>Benefit:</strong> Safe wine tasting, professional guidance, stress-free</li>\n</ul>\n</li>\n<li><strong>Ferry (Frioul Islands, Day 27):</strong> €10–15 return per person</li>\n<li><strong>Other buses/taxis:</strong> ~€30–50 miscellaneous</li>\n</ul>\n<p><strong>Total Transport:</strong> ~€435–625 for couple (€220–310pp)</p>\n<hr>\n<h3><strong>Restaurant Booking Summary (Michelin/Special Dinners)</strong></h3>\n<p><strong>Must Book Ahead:</strong></p>\n<ol>\n<li><strong>Day 5 (Antibes):</strong> Mickaël Féval (Michelin-starred, €70–100pp)</li>\n<li><strong>Day 8 Evening (Aix):</strong> Caruso or Le Jasmin (casual, €50–70pp)</li>\n<li><strong>Day 10 (Avignon):</strong> La Mirande (upscale Provençal, €70–100pp)</li>\n<li><strong>Day 11 (Alps/Arles):</strong> Casual lunch/dinner (no special booking needed)</li>\n<li><strong>Day 12 Evening (Lavender/Bastille Day, Aix):</strong> ⭐ <strong>PIERRE REBOUL (Michelin, €80–120pp)</strong> – YOUR SINGLE MICHELIN DINNER ⭐<ul>\n<li>Modern French cuisine with Provence focus</li>\n<li>Menu redesigned every 6 weeks with wine pairings</li>\n<li>Refined but accessible atmosphere</li>\n<li>Book 4–6 weeks in advance</li>\n<li>Alternative: Château de la Gaude (if fully booked, €100–130pp)</li>\n</ul>\n</li>\n<li><strong>Day 20 Evening (Châteauneuf):</strong> Hotel restaurant or casual dinner (wine-focused)</li>\n<li><strong>Day 22 Evening (Cassis):</strong> Clos Sainte-Magdeleine (Michelin, €80–120pp) – optional alternative</li>\n<li><strong>Day 26 Evening (Marseille):</strong> Chez Fonfon (legendary bouillabaisse, €70–100pp) – optional alternative</li>\n</ol>\n<p><strong>Casual/Walk-in Options:</strong> Le Vauban, Le Jasmin, Pizzeria La Mamma, Le Comptoir, Café Poulailler, Soraya, Caruso, etc.</p>\n<hr>\n<h3><strong>Budget Estimate (per person, approximate)</strong></h3>\n<table>\n<thead>\n<tr>\n<th>Category</th>\n<th>Estimate</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Flights</td>\n<td>~€300–400 (split 4 ways)</td>\n</tr>\n<tr>\n<td>Accommodation</td>\n<td>~€1,500 (27 nights, €55–75/night average)</td>\n</tr>\n<tr>\n<td>Meals (average €20–30 casual, €70–100 special)</td>\n<td>~€1,200–1,500</td>\n</tr>\n<tr>\n<td>Train tickets (day trips)</td>\n<td>~€100–150</td>\n</tr>\n<tr>\n<td>Car rental + fuel (5 days: Days 11, 12, 18–20)</td>\n<td>~€200–280 (split 2 ways = ~€100–140pp)</td>\n</tr>\n<tr>\n<td>Taxi/Driver services (2 wine days)</td>\n<td>~€160–240 total (split = ~€80–120pp)</td>\n</tr>\n<tr>\n<td>Activities (boat tours, museums, wine tastings)</td>\n<td>~€200–300</td>\n</tr>\n<tr>\n<td><strong>Total Estimate per Person</strong></td>\n<td><strong>~€3,600–4,200</strong></td>\n</tr>\n</tbody>\n</table>\n<p><strong>Note:</strong> Taxi/driver services for wine days are safer &amp; more enjoyable than self-driving; costs roughly equivalent to car rental days skipped.</p>\n<hr>\n<h3><strong>Packing Tips</strong></h3>\n<ul>\n<li><strong>Beach gear:</strong> Swimsuit, sunscreen, beach bag (essential Days 2–7, 21–25)</li>\n<li><strong>Wine region:</strong> Comfortable walking shoes, sun hat, light layers (Days 14–20)</li>\n<li><strong>Formal dinner:</strong> One smart outfit for Michelin restaurants</li>\n<li><strong>Sun protection:</strong> High SPF, hat, sunglasses (Mediterranean sun is intense)</li>\n<li><strong>Casual evening wear:</strong> Nice-casual for restaurant dinners (France dresses slightly smarter)</li>\n<li><strong>Light layers:</strong> Evenings can cool in countryside/coast</li>\n<li><strong>Medications:</strong> Any prescriptions, plus basic travel first aid</li>\n</ul>\n<hr>\n<h3><strong>French Phrases &amp; Reservations</strong></h3>\n<p><strong>Booking a Restaurant:</strong></p>\n<ul>\n<li>&ldquo;Je voudrais réserver une table pour deux, le [date] à [time]&rdquo; (I&rsquo;d like to reserve a table for two on [date] at [time])</li>\n<li>&ldquo;Réservé au nom de [Name]&rdquo; (Under the name&hellip;)</li>\n<li>Book online via TheFork.fr or call directly</li>\n</ul>\n<p><strong>Wine Tasting Etiquette:</strong></p>\n<ul>\n<li>Tastings are social; ask winemaker questions</li>\n<li>Spitting (into buckets provided) is acceptable &amp; common</li>\n<li>Purchasing a bottle after tasting is polite but not obligatory</li>\n</ul>\n<p><strong>Basic French:</strong></p>\n<ul>\n<li>&ldquo;Bonjour&rdquo; (Good morning/day)</li>\n<li>&ldquo;S&rsquo;il vous plaît&rdquo; (Please – formal)</li>\n<li>&ldquo;Merci&rdquo; (Thank you)</li>\n<li>&ldquo;L&rsquo;addition, s&rsquo;il vous plaît&rdquo; (The bill, please)</li>\n</ul>\n<hr>\n<h3><strong>Final Notes &amp; Recommendations</strong></h3>\n<ol>\n<li><strong>Book Ahead:</strong> Michelin restaurants, popular wineries (Châteauneuf, Bandol), Calanques boat tours</li>\n<li><strong>Flexibility:</strong> Keep Days 17 &amp; 23 open for weather/spontaneity</li>\n<li><strong>Pace:</strong> Good balance of activity (Days 3, 4, 10, 11, 14–16, 22, 26) and rest (Days 7, 13, 17, 25)</li>\n<li><strong>Family Week:</strong> Antibes is perfect base – beaches, day trips, relaxation together</li>\n<li><strong>Couple Exploration:</strong> Aix/Châteauneuf/Cassis focus on food, wine, countryside, coastal beauty</li>\n<li><strong>Marseille Finale:</strong> Urban energy, authentic Provence, good food finale before departure</li>\n<li><strong>Wine Focus:</strong> Days 14–20 give solid wine education without excessive tastings</li>\n<li><strong>Transportation:</strong> Mix of train (easy, scenic) and car (flexible, countryside access) works well</li>\n<li><strong>Food:</strong> Restaurant scene is excellent – don&rsquo;t hesitate to try recommendations</li>\n<li><strong>August Considerations:</strong> July is peak season – beaches/towns busier mid-week than weekends</li>\n</ol>\n<hr>\n<p><strong>Bon voyage!</strong> This itinerary balances family time, couple exploration, food culture, wine education, Mediterranean beauty, and urban energy. Adjust as needed – the framework is solid, but spontaneity &amp; personal preference should always trump the plan.</p>\n<hr>\n<p><em>Last Updated: 28 May 2026</em>\n<em>Itinerary designed for Family of 4 (then Couple of 2)</em>\n<em>27-day France journey: Antibes → Aix → Châteauneuf → Cassis → Marseille</em></p>"};
const TRIP_ENDPOINT = "/.netlify/functions/trip";
const LOCAL_FALLBACK_KEY = "france_july_2026_itinerary_edits_v1"; // offline-only fallback, not synced
const tabs = document.getElementById("day-tabs");
const body = document.getElementById("itin-body");
const savedNote = document.getElementById("saved-note");
const dayJump = document.getElementById("day-jump");
const prevDayBtn = document.getElementById("prev-day-btn");
const nextDayBtn = document.getElementById("next-day-btn");
const panels = [
  { label: "Overview", name: "Trip", heading: "Trip Overview", html: TRIP.intro_html },
  ...TRIP.days,
  { label: "Appendix", name: "Notes", heading: "Appendix", html: TRIP.appendix_html }
];
let activeIndex = 0;
let saveTimers = {};
let pollTimer = null;

function escapeText(value) {
  const span = document.createElement("span");
  span.textContent = value || "";
  return span.innerHTML;
}

function notify(text) {
  savedNote.textContent = text;
  savedNote.classList.add("show");
  window.setTimeout(() => savedNote.classList.remove("show"), 1300);
}

function readLocalFallback() {
  try { return JSON.parse(localStorage.getItem(LOCAL_FALLBACK_KEY) || "{}"); }
  catch (_) { return {}; }
}

function writeLocalFallback(edits) {
  try { localStorage.setItem(LOCAL_FALLBACK_KEY, JSON.stringify(edits)); } catch (_) {}
}

async function fetchEdits() {
  try {
    const res = await fetch(TRIP_ENDPOINT, { cache: "no-store" });
    if (!res.ok) throw new Error("bad response");
    const data = await res.json();
    writeLocalFallback(data || {});
    return data || {};
  } catch (_) {
    // Offline or function unavailable - fall back to whatever this browser last saw
    return readLocalFallback();
  }
}

async function saveEdit(panelId, html) {
  try {
    const res = await fetch(TRIP_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ panelId, html })
    });
    if (!res.ok) throw new Error("save failed");
    notify("Saved to all devices");
  } catch (_) {
    notify("Offline - saved on this device only");
    const local = readLocalFallback();
    local[panelId] = html;
    writeLocalFallback(local);
  }
}

function scheduleSave(panelId, el) {
  window.clearTimeout(saveTimers[panelId]);
  saveTimers[panelId] = window.setTimeout(() => saveEdit(panelId, el.innerHTML), 600);
}

function applyRemoteEdits(edits) {
  if (!edits) return;
  document.querySelectorAll(".editable-content").forEach((el) => {
    const id = el.dataset.panelId;
    const incoming = edits[id];
    // Don't clobber a panel the user is actively typing in
    if (incoming !== undefined && document.activeElement !== el && el.innerHTML !== incoming) {
      el.innerHTML = incoming;
    }
  });
}

async function pollForUpdates() {
  const edits = await fetchEdits();
  applyRemoteEdits(edits);
}

function switchPanel(index) {
  index = Math.max(0, Math.min(index, panels.length - 1));
  activeIndex = index;
  document.querySelectorAll(".day-tab").forEach((el, i) => el.classList.toggle("active", i === index));
  document.querySelectorAll(".panel").forEach((el, i) => el.classList.toggle("active", i === index));
  if (dayJump) dayJump.value = String(index);
  if (prevDayBtn) prevDayBtn.disabled = index === 0;
  if (nextDayBtn) nextDayBtn.disabled = index === panels.length - 1;
  const activeTab = document.querySelector(".day-tab.active");
  if (activeTab) activeTab.scrollIntoView({ block: "nearest", inline: "center", behavior: "smooth" });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function render() {
  document.getElementById("itin-title").textContent = TRIP.title;
  document.getElementById("itin-dates").textContent = TRIP.dates;
  const edits = await fetchEdits();
  panels.forEach((panel, index) => {
    const option = document.createElement("option");
    option.value = String(index);
    option.textContent = `${panel.label} - ${panel.name || panel.heading || ""}`;
    dayJump.appendChild(option);

    const tab = document.createElement("button");
    tab.type = "button";
    tab.className = "day-tab" + (index === 0 ? " active" : "");
    tab.innerHTML = `<span class="day-tab-label">${escapeText(panel.label)}</span><span class="day-tab-name">${escapeText(panel.name)}</span>`;
    tab.addEventListener("click", () => switchPanel(index));
    tabs.appendChild(tab);

    const section = document.createElement("section");
    section.className = "panel" + (index === 0 ? " active" : "");
    section.innerHTML = `
      <div class="panel-shell">
        <div class="panel-heading">
          <div class="panel-kicker">${escapeText(panel.label)}</div>
          <h2 class="panel-title">${escapeText(panel.heading || panel.name)}</h2>
        </div>
        <article class="editable-content" data-panel-id="${index}" contenteditable="true" spellcheck="true">${edits[index] || panel.html || ""}</article>
      </div>`;
    const editable = section.querySelector(".editable-content");
    editable.addEventListener("input", () => scheduleSave(index, editable));
    body.appendChild(section);
  });
  switchPanel(0);

  // Keep devices in sync: refetch periodically and whenever the tab regains focus
  pollTimer = window.setInterval(pollForUpdates, 8000);
  window.addEventListener("focus", pollForUpdates);
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") pollForUpdates();
  });
}

function exportHtml() {
  const clone = document.documentElement.cloneNode(true);
  clone.querySelectorAll(".editable-content").forEach((el, i) => {
    panels[i].html = el.innerHTML;
  });
  const blob = new Blob(["<!DOCTYPE html>\n" + clone.outerHTML], { type: "text/html" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "France_July_2026_Interactive_Itinerary_edited.html";
  link.click();
  URL.revokeObjectURL(link.href);
}

document.getElementById("save-btn").addEventListener("click", () => {
  document.querySelectorAll(".editable-content").forEach((el) => {
    saveEdit(el.dataset.panelId, el.innerHTML);
  });
});
document.getElementById("export-btn").addEventListener("click", exportHtml);
dayJump.addEventListener("change", () => switchPanel(Number(dayJump.value)));
prevDayBtn.addEventListener("click", () => switchPanel(activeIndex - 1));
nextDayBtn.addEventListener("click", () => switchPanel(activeIndex + 1));
document.getElementById("reset-btn").addEventListener("click", async () => {
  if (!confirm("Reset saved edits for ALL devices? This clears the shared itinerary data.")) return;
  try { await fetch(TRIP_ENDPOINT, { method: "DELETE" }); } catch (_) {}
  localStorage.removeItem(LOCAL_FALLBACK_KEY);
  window.location.reload();
});
render();
</script>
